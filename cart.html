<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Cart – Drappii</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background:#f1f3f6; margin:0; }
    header { background:#2874f0; color:#fff; padding:14px; font-size:18px; }
    .item {
      background:#fff;
      margin:10px;
      padding:10px;
      display:flex;
      gap:10px;
      border-radius:8px;
    }
    img { width:80px; height:80px; object-fit:contain; }
    .qty button { padding:4px 8px; }
    .total { font-size:18px; font-weight:bold; padding:10px; }
  </style>
</head>

<body>

<header>My Cart</header>
<div id="cart"></div>
<div class="total" id="total"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, updateDoc } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const cartDiv = document.getElementById("cart");
  const totalDiv = document.getElementById("total");

  onAuthStateChanged(auth, async user => {
    if (!user) {
      location.href = "login.html";
      return;
    }

    const itemsRef = collection(db, "carts", user.uid, "items");
    const snap = await getDocs(itemsRef);

    let total = 0;
    cartDiv.innerHTML = "";

    snap.forEach(docu => {
      const i = docu.data();
      total += i.price * i.qty;

      cartDiv.innerHTML += `
        <div class="item">
          <img src="${i.image}">
          <div>
            <div>${i.name}</div>
            <div>₹${i.price}</div>
            <div class="qty">
              Qty: ${i.qty}
            </div>
          </div>
        </div>
      `;
    });

    totalDiv.innerText = "Total: ₹" + total;
  });
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, doc, updateDoc } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ⏳ Wait till cart items are rendered
  setTimeout(() => {
    document.querySelectorAll(".item").forEach(item => {
      if (item.querySelector(".auto-qty")) return;

      const qtyText = item.innerText.match(/Qty:\s*(\d+)/);
      if (!qtyText) return;

      const qty = Number(qtyText[1]);
      const docId = item.getAttribute("data-id");

      if (!docId) return;

      const qtyDiv = document.createElement("div");
      qtyDiv.className = "auto-qty";
      qtyDiv.style.marginTop = "6px";

      qtyDiv.innerHTML = `
        <button data-action="minus">−</button>
        <span style="margin:0 10px">${qty}</span>
        <button data-action="plus">+</button>
      `;

      item.appendChild(qtyDiv);

      qtyDiv.addEventListener("click", async (e) => {
        const action = e.target.getAttribute("data-action");
        if (!action) return;

        const user = auth.currentUser;
        if (!user) return;

        let newQty = qty;
        if (action === "plus") newQty++;
        if (action === "minus" && qty > 1) newQty--;

        const ref = doc(db, "carts", user.uid, "items", docId);
        await updateDoc(ref, { qty: newQty });

        location.reload();
      });
    });
  }, 1200);
</script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, doc, updateDoc, deleteDoc, addDoc, collection, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ⏳ Wait till cart items render
  setTimeout(() => {
    document.querySelectorAll(".item").forEach(item => {
      if (item.dataset.enhanced) return;
      item.dataset.enhanced = "yes";

      const user = auth.currentUser;
      if (!user) return;

      // 🔎 Try to find product id safely
      const docId = item.getAttribute("data-id");
      if (!docId) return;

      // 🔢 Read qty from text
      const qtyMatch = item.innerText.match(/Qty[:\s]+(\d+)/);
      let qty = qtyMatch ? Number(qtyMatch[1]) : 1;

      /* =====================
         A) QUANTITY + / −
         ===================== */
      const qtyBox = document.createElement("div");
      qtyBox.style.marginTop = "6px";
      qtyBox.innerHTML = `
        <button data-act="minus">−</button>
        <span style="margin:0 10px">${qty}</span>
        <button data-act="plus">+</button>
      `;
      item.appendChild(qtyBox);

      qtyBox.addEventListener("click", async (e) => {
        const act = e.target.dataset.act;
        if (!act) return;

        let newQty = qty;
        if (act === "plus") newQty++;
        if (act === "minus" && qty > 1) newQty--;

        await updateDoc(doc(db, "carts", user.uid, "items", docId), {
          qty: newQty
        });
        location.reload();
      });

      /* =====================
         B) REMOVE ITEM
         ===================== */
      const removeBtn = document.createElement("button");
      removeBtn.innerText = "🗑️ Remove";
      removeBtn.style.cssText = `
        margin-top:8px;
        background:#ff3f6c;
        color:#fff;
        border:none;
        padding:6px 10px;
        border-radius:6px;
        cursor:pointer;
        font-size:13px;
      `;
      item.appendChild(removeBtn);

      removeBtn.onclick = async () => {
        if (!confirm("Remove item from cart?")) return;
        await deleteDoc(doc(db, "carts", user.uid, "items", docId));
        location.reload();
      };

      /* =====================
         C) BUY NOW
         ===================== */
      const buyBtn = document.createElement("button");
      buyBtn.innerText = "⚡ Buy Now";
      buyBtn.style.cssText = `
        margin-top:6px;
        background:#fb641b;
        color:#fff;
        border:none;
        padding:8px 12px;
        border-radius:6px;
        cursor:pointer;
        font-size:14px;
        display:block;
      `;
      item.appendChild(buyBtn);

      buyBtn.onclick = async () => {
        const name = item.innerText.split("\n")[0] || "Product";
        const priceMatch = item.innerText.match(/₹(\d+)/);
        const price = priceMatch ? Number(priceMatch[1]) : 0;

        await addDoc(collection(db, "orders"), {
          uid: user.uid,
          productId: docId,
          name,
          price,
          qty,
          status: "Placed",
          createdAt: serverTimestamp()
        });

        // remove from cart after order
        await deleteDoc(doc(db, "carts", user.uid, "items", docId));

        alert("Order placed successfully");
        location.href = "orders.html";
      };
    });
  }, 1200);
  </script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, getDocs } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 🔵 Create cart icon (auto inject)
  const cartIcon = document.createElement("div");
  cartIcon.style.cssText = `
    position:fixed;
    top:14px;
    right:16px;
    background:#fff;
    border-radius:20px;
    padding:6px 10px;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    cursor:pointer;
    z-index:9999;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:6px;
  `;
  cartIcon.innerHTML = `
    🛒 <span id="cartCount"
      style="
        background:#ff3f6c;
        color:#fff;
        border-radius:50%;
        padding:2px 6px;
        font-size:12px;
        display:none;
      ">0</span>
  `;
  document.body.appendChild(cartIcon);

  cartIcon.onclick = () => {
    location.href = "cart.html";
  };

  // 🔄 Update cart count
  onAuthStateChanged(auth, async (user) => {
    if (!user) return;

    const snap = await getDocs(
      collection(db, "carts", user.uid, "items")
    );

    let count = 0;
    snap.forEach(doc => {
      const d = doc.data();
      count += d.qty || 1;
    });

    const badge = document.getElementById("cartCount");
    if (count > 0) {
      badge.innerText = count;
      badge.style.display = "inline-block";
    } else {
      badge.style.display = "none";
    }
  });
  </script>
</body>
</html>
