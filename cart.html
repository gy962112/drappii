<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>My Cart – Drappii</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; background:#f1f3f6; margin:0; }
    header { background:#2874f0; color:#fff; padding:14px; font-size:18px; }
    .item {
      background:#fff;
      margin:10px;
      padding:10px;
      display:flex;
      gap:10px;
      border-radius:8px;
    }
    img { width:80px; height:80px; object-fit:contain; }
    .qty button { padding:4px 8px; }
    .total { font-size:18px; font-weight:bold; padding:10px; }
  </style>
</head>

<body>

<header>My Cart</header>
<div id="cart"></div>
<div class="total" id="total"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, updateDoc } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const cartDiv = document.getElementById("cart");
  const totalDiv = document.getElementById("total");

  onAuthStateChanged(auth, async user => {
    if (!user) {
      location.href = "login.html";
      return;
    }

    const itemsRef = collection(db, "carts", user.uid, "items");
    const snap = await getDocs(itemsRef);

    let total = 0;
    cartDiv.innerHTML = "";

    snap.forEach(docu => {
      const i = docu.data();
      total += i.price * i.qty;

      cartDiv.innerHTML += `
        <div class="item">
          <img src="${i.image}">
          <div>
            <div>${i.name}</div>
            <div>₹${i.price}</div>
            <div class="qty">
              Qty: ${i.qty}
            </div>
          </div>
        </div>
      `;
    });

    totalDiv.innerText = "Total: ₹" + total;
  });
</script>

</body>
</html>
