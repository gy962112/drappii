<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Cart | Drapii</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --meesho-pink: #f43397; --bg-light: #f8f8f8; --text-gray: #666; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-light); padding-bottom: 100px; }
        
        /* Header */
        .cart-header { 
            background: #fff; padding: 15px; font-weight: 700; 
            border-bottom: 1px solid #eee; display: flex; gap: 15px; 
            align-items: center; position: sticky; top: 0; z-index: 100;
        }

        /* Loader */
        #loader { text-align: center; padding: 50px; display: block; }
        .spinner { 
            width: 40px; height: 40px; border: 4px solid #f3f3f3; 
            border-top: 4px solid var(--meesho-pink); border-radius: 50%; 
            animation: spin 1s linear infinite; margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Cart Items */
        .cart-item { background: #fff; padding: 15px; display: flex; gap: 12px; margin-bottom: 8px; position: relative; border-bottom: 1px solid #f1f1f1; }
        .item-img { width: 85px; height: 110px; object-fit: cover; border-radius: 4px; background: #eee; }
        
        .item-details { flex: 1; }
        .item-name { font-size: 14px; color: #333; margin-bottom: 4px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .item-price { font-weight: 800; font-size: 16px; color: #333; margin-top: 5px; }
        
        /* Quantity Controls */
        .qty-control { display: flex; align-items: center; gap: 12px; margin-top: 10px; border: 1px solid #ddd; width: fit-content; border-radius: 4px; padding: 2px 8px; }
        .qty-btn { cursor: pointer; color: var(--meesho-pink); font-weight: bold; padding: 4px; }
        .qty-num { font-size: 14px; font-weight: 600; width: 20px; text-align: center; }

        .trash-btn { position: absolute; top: 15px; right: 15px; color: #999; font-size: 18px; padding: 5px; cursor: pointer; }

        /* Summary */
        .price-summary { background: #fff; padding: 16px; margin-top: 10px; }
        .sum-row { display: flex; justify-content: space-between; margin-bottom: 12px; color: var(--text-gray); font-size: 14px; }
        .sum-total { font-weight: 800; font-size: 18px; color: #333; border-top: 1px dashed #ddd; padding-top: 12px; }

        /* Footer */
        .cart-footer { 
            position: fixed; bottom: 0; width: 100%; background: #fff; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 16px; border-top: 1px solid #eee; z-index: 1000;
        }
        .btn-checkout { background: var(--meesho-pink); color: #fff; padding: 12px 30px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; }
        
        .empty-cart { text-align: center; padding: 100px 20px; color: #999; }
        .empty-cart i { font-size: 60px; color: #eee; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="cart-header">
        <i class="fa fa-arrow-left" onclick="history.back()"></i> 
        <span>My Cart</span>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:10px; color:#999; font-size:12px;">Checking your goodies...</p>
    </div>

    <div id="cartItemsContainer"></div>

    <div id="summarySection" style="display: none;">
        <div class="price-summary">
            <p style="font-weight:700; margin-bottom:15px;">Price Details</p>
            <div class="sum-row"><span>Total Price</span><span id="orderTotal">₹0</span></div>
            <div class="sum-row"><span>Delivery Charges</span><span style="color:#03a685">FREE</span></div>
            <div class="sum-row sum-total"><span>Order Total</span><span id="finalPrice">₹0</span></div>
        </div>
    </div>

    <div class="cart-footer" id="cartFooter" style="display: none;">
        <div>
            <p id="footerPrice" style="font-weight:900; font-size:18px;">₹0</p>
            <p style="font-size:11px; color: var(--meesho-pink);">View Price Details</p>
        </div>
        <button class="btn-checkout" onclick="location.href='checkout.html'">Continue</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
            authDomain: "fashora-flipkart.firebaseapp.com",
            projectId: "fashora-flipkart",
            storageBucket: "fashora-flipkart.firebasestorage.app",
            messagingSenderId: "383843603520",
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if(!user) { window.location.href = 'login.html'; return; }
            loadCartItems(user.uid);
        });

        async function loadCartItems(uid) {
            const container = document.getElementById('cartItemsContainer');
            const summary = document.getElementById('summarySection');
            const footer = document.getElementById('cartFooter');
            
            try {
                const q = query(collection(db, "carts"), where("userId", "==", uid));
                const snap = await getDocs(q);
                
                document.getElementById('loader').style.display = "none";
                container.innerHTML = "";

                if (snap.empty) {
                    container.innerHTML = `<div class="empty-cart"><i class="fa-solid fa-cart-shopping"></i><p>Your cart is lonely!</p><button onclick="location.href='index.html'" style="margin-top:20px; padding:10px 25px; border:1.5px solid var(--meesho-pink); color:var(--meesho-pink); background:white; border-radius:5px; font-weight:700;">Shop Now</button></div>`;
                    summary.style.display = "none";
                    footer.style.display = "none";
                    return;
                }

                let total = 0;
                snap.forEach(d => {
                    const item = d.data();
                    const qty = item.quantity || 1;
                    const price = (parseInt(item.price) || 0) * qty;
                    total += price;
                    
                    container.innerHTML += `
                        <div class="cart-item">
                            <img src="${item.image}" class="item-img">
                            <div class="item-details">
                                <p class="item-name">${item.name}</p>
                                <p style="font-size:12px; color:#666;">Size: ${item.size || 'M'}</p>
                                <p class="item-price">₹${price}</p>
                                <div class="qty-control">
                                    <span class="qty-btn" onclick="window.updateQty('${d.id}', ${qty - 1})">-</span>
                                    <span class="qty-num">${qty}</span>
                                    <span class="qty-btn" onclick="window.updateQty('${d.id}', ${qty + 1})">+</span>
                                </div>
                            </div>
                            <i class="fa-regular fa-trash-can trash-btn" onclick="window.delItem('${d.id}')"></i>
                        </div>`;
                });

                summary.style.display = "block";
                footer.style.display = "flex";
                document.getElementById('orderTotal').innerText = "₹" + total;
                document.getElementById('finalPrice').innerText = "₹" + total;
                document.getElementById('footerPrice').innerText = "₹" + total;

            } catch (error) { console.error(error); }
        }

        window.updateQty = async (id, newQty) => {
            if(newQty < 1) return;
            try {
                await updateDoc(doc(db, "carts", id), { quantity: newQty });
                loadCartItems(auth.currentUser.uid);
            } catch (e) { alert(e.message); }
        };

        window.delItem = async (itemId) => {
            if(confirm("Remove this item?")) {
                try {
                    await deleteDoc(doc(db, "carts", itemId));
                    loadCartItems(auth.currentUser.uid);
                } catch (e) { alert(e.message); }
            }
        };
    </script>
</body>
</html>
