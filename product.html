<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | Drapii Luxe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --accent: #9f2089; /* Meesho Purple/Pink */
            --accent-gradient: linear-gradient(135deg, #9f2089 0%, #ff5e9e 100%);
            --glass: rgba(255, 255, 255, 0.9); 
            --bg-page: #f8f9fa; 
            --text-main: #2d0c28;
            --text-muted: #666;
            --card-radius: 0px; /* Meesho style is more flat/square at edges */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #f1f4f6; color: var(--text-main); padding-bottom: 100px; }

        header { 
            background: #fff; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; 
            position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #eee;
        }
        .back-btn { font-size: 20px; color: #333; cursor: pointer; }

        /* Full Image View */
        .image-gallery { background: #fff; width: 100%; height: 60vh; overflow: hidden; margin-top: 45px; position: relative; display: flex; }
        .slider-container { display: flex; width: 100%; height: 100%; overflow-x: scroll; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slider-item { min-width: 100%; height: 100%; scroll-snap-align: start; }
        .slider-item img { width: 100%; height: 100%; object-fit: contain; }
        
        .slider-dots { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .dot { width: 6px; height: 6px; background: #ddd; border-radius: 50%; }
        .dot.active { background: var(--accent); width: 15px; border-radius: 10px; }

        /* Meesho Style Card Sections */
        .meesho-card { background: #fff; padding: 15px; margin-bottom: 8px; position: relative; }
        .p-title { font-size: 17px; font-weight: 500; color: #666; margin-bottom: 8px; }
        .price-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .current-price { font-size: 24px; font-weight: 800; color: #000; }
        .delivery-tag { color: #03a685; font-size: 13px; font-weight: 700; margin-top: 5px; }
        
        /* Rating Badge */
        .rating-chip { background: #03a685; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 4px; }

        .section-title { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 12px; }
        
        /* Size Chips */
        .variant-chips { display: flex; gap: 10px; margin-bottom: 10px; }
        .chip { border: 1px solid #ddd; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; color: #333; }
        .chip.selected { border-color: var(--accent); color: var(--accent); background: #fdf0ff; }

        /* Seller Section */
        .seller-box { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; }
        .seller-info { display: flex; align-items: center; gap: 10px; }
        .seller-img { width: 40px; height: 40px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: var(--accent); border: 1px solid #eee; }
        .view-shop { border: 1px solid var(--accent); color: var(--accent); padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: 700; }

        /* Footer */
        .sticky-footer { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #fff; display: grid; grid-template-columns: 1fr 1fr; 
            padding: 10px; gap: 10px; border-top: 1px solid #eee; z-index: 1000;
        }
        .btn-footer { padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 700; border: 1px solid #ddd; }
        .cart-btn { background: #fff; color: #333; }
        .buy-btn { background: var(--accent); color: #fff; border: none; }

        /* Similar Grid */
        .similar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f1f4f6; }
        .sim-card { background: #fff; padding: 0; }
        .sim-card img { width: 100%; aspect-ratio: 0.8; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <i class="fa-solid fa-arrow-left back-btn" onclick="location.href='index.html'"></i>
        <div style="display:flex; gap:20px;">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-solid fa-heart"></i>
            <a href="cart.html" style="color:#333;"><i class="fa-solid fa-cart-shopping"></i></a>
        </div>
    </header>

    <div class="image-gallery">
        <div class="slider-container" id="imageSlider"></div>
        <div class="slider-dots" id="sliderDots"></div>
    </div>

    <div class="meesho-card">
        <h1 id="pName" class="p-title">Loading Product...</h1>
        <div class="price-row">
            <span id="pPrice" class="current-price">₹--</span>
        </div>
        <div class="rating-chip">3.8 <i class="fa-solid fa-star"></i></div>
        <span style="font-size: 12px; color: #999; margin-left: 5px;">1405 Ratings</span>
        <div class="delivery-tag">Free Delivery</div>
    </div>

    <div class="meesho-card">
        <div class="section-title">Select Size</div>
        <div id="sizeList" class="variant-chips"></div>
    </div>

    <div class="meesho-card">
        <div class="section-title">Sold By</div>
        <div class="seller-box">
            <div class="seller-info">
                <div class="seller-img"><i class="fa-solid fa-store"></i></div>
                <div>
                    <b style="font-size:14px;">Drapii Elite Hub</b>
                    <div style="font-size:12px; color:#03a685; font-weight:700;">4.0 <i class="fa-solid fa-star"></i> <span style="color:#999; font-weight:400;">(24,672 Ratings)</span></div>
                </div>
            </div>
            <div class="view-shop">View Shop</div>
        </div>
    </div>

    <div class="meesho-card">
        <div class="section-title">Product Details</div>
        <div id="pDesc" style="font-size:13px; color:#555; line-height:1.6;"></div>
    </div>

    <div style="padding: 15px; font-weight: 700; color: #666;">Similar Products</div>
    <div class="similar-grid" id="similarGrid"></div>

    <div class="sticky-footer">
        <button class="btn-footer cart-btn" onclick="addToCart(false)">
            <i class="fa-solid fa-cart-plus"></i> Add to Cart
        </button>
        <button class="btn-footer buy-btn" onclick="addToCart(true)">
            <i class="fa-solid fa-angles-right"></i> Buy Now
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs, query, where, limit, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
            authDomain: "fashora-flipkart.firebaseapp.com",
            projectId: "fashora-flipkart",
            storageBucket: "fashora-flipkart.firebasestorage.app",
            messagingSenderId: "383843603520",
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let productData = null;
        let selectedSize = "";
        let firstMainImage = ""; 

        function extractImageUrl(input) {
            if (!input) return "";
            if (input.startsWith('http')) return input.replace(/['"]+/g, '').trim();
            const match = input.match(/src="([^"]+)"/);
            return match ? match[1] : input.replace(/['"]+/g, '').trim();
        }

        window.selectSize = (el) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedSize = el.innerText;
        };

        async function loadProduct() {
            if (!productId) { window.location.href = 'index.html'; return; }
            try {
                const docSnap = await getDoc(doc(db, "products", productId));
                if (docSnap.exists()) {
                    productData = docSnap.data();
                    const imageInput = productData.image || "";
                    const imgUrls = imageInput.split(',').map(u => extractImageUrl(u.trim())).filter(u => u !== "");
                    firstMainImage = imgUrls[0];

                    let sliderHtml = "";
                    let dotsHtml = "";
                    imgUrls.forEach((url, i) => {
                        sliderHtml += `<div class="slider-item"><img src="${url}"></div>`;
                        dotsHtml += `<div class="dot ${i === 0 ? 'active' : ''}"></div>`;
                    });
                    
                    document.getElementById('imageSlider').innerHTML = sliderHtml;
                    document.getElementById('sliderDots').innerHTML = dotsHtml;
                    document.getElementById('pName').innerText = productData.name;
                    document.getElementById('pPrice').innerText = "₹" + Number(productData.price).toLocaleString();
                    document.getElementById('pDesc').innerHTML = `
                        <p>Fabric: <b>Cotton</b></p>
                        <p>Pattern: <b>Solid</b></p>
                        <p>Description: ${productData.description || "Premium quality product."}</p>
                    `;

                    if(productData.sizes) {
                        let sizeHtml = "";
                        productData.sizes.forEach((s, index) => {
                            const active = index === 0 ? "selected" : "";
                            if(index === 0) selectedSize = s;
                            sizeHtml += `<div class="chip ${active}" onclick="selectSize(this)">${s}</div>`;
                        });
                        document.getElementById('sizeList').innerHTML = sizeHtml;
                    }
                    loadSimilarProducts(productData.category);
                }
            } catch (error) { console.error(error); }
        }

        async function loadSimilarProducts(category) {
            const q = query(collection(db, "products"), where("category", "==", category), limit(4));
            const snap = await getDocs(q);
            let html = "";
            snap.forEach(doc => {
                if(doc.id !== productId) {
                    const data = doc.data();
                    html += `
                        <div class="sim-card" onclick="location.href='product.html?id=${doc.id}'">
                            <img src="${extractImageUrl(data.image)}">
                            <div style="padding:8px;">
                                <p style="font-size:12px; color:#666; margin-bottom:4px;">${data.name}</p>
                                <p style="font-size:15px; font-weight:800;">₹${data.price}</p>
                                <div class="delivery-tag" style="font-size:10px;">Free Delivery</div>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('similarGrid').innerHTML = html;
        }

        window.addToCart = async function(isBuyNow) {
            const user = auth.currentUser;
            if (!user) { window.location.href='signup.html'; return; }
            if(isBuyNow) {
                localStorage.setItem('checkoutItem', JSON.stringify({
                    name: productData.name, price: Number(productData.price),
                    image: firstMainImage, size: selectedSize, productId: productId,
                    sellerId: productData.sellerId || "admin"
                }));
                window.location.href = 'checkout.html';
            } else {
                await addDoc(collection(db, "carts"), {
                    userId: user.uid, productId: productId,
                    name: productData.name, price: Number(productData.price),
                    image: firstMainImage, size: selectedSize, timestamp: serverTimestamp()
                });
                window.location.href = 'cart.html';
            }
        };

        const slider = document.getElementById('imageSlider');
        slider.addEventListener('scroll', () => {
            const index = Math.round(slider.scrollLeft / slider.offsetWidth);
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        });

        loadProduct();
    </script>
</body>
</html>
