<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drappii – Product</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f1f3f6;
}

/* HEADER */
header{
  background:#2874f0;
  color:#fff;
  padding:12px;
  font-size:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

/* MAIN */
.container{
  padding:14px;
}

.image-box{
  width:100%;
  height:240px;
  background:#fff;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:14px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
  font-size:60px;
}

.title{
  font-size:20px;
  font-weight:bold;
  margin-bottom:8px;
}

.price{
  font-size:24px;
  font-weight:bold;
  color:#388e3c;
  margin-bottom:16px;
}

/* ACTION BAR */
.action-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  display:flex;
  border-top:1px solid #ddd;
}

.action-bar button{
  flex:1;
  padding:14px;
  font-size:16px;
  border:none;
  cursor:pointer;
}

.cart-btn{
  background:#ff9f00;
  font-weight:bold;
}

.buy-btn{
  background:#fb641b;
  color:#fff;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  ← Product
</header>

<div class="container">
  <div class="image-box">📦</div>

  <div class="title" id="pname">Loading product…</div>
  <div class="price" id="pprice"></div>
</div>

<div class="action-bar">
  <button class="cart-btn" id="addCart">Add to Cart</button>
  <button class="buy-btn">Buy Now</button>
</div>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* 🔐 Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
  authDomain: "fashora-flipkart.firebaseapp.com",
  projectId: "fashora-flipkart",
  storageBucket: "fashora-flipkart.firebasestorage.app",
  messagingSenderId: "383843603520",
  appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
};

/* Init Firebase */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* Get product ID from URL */
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

const nameEl  = document.getElementById("pname");
const priceEl = document.getElementById("pprice");
const cartBtn = document.getElementById("addCart");

if (!productId) {
  nameEl.innerText = "Invalid product";
  cartBtn.disabled = true;
} else {
  /* Load product */
  db.collection("products").doc(productId).get()
    .then(doc => {
      if (!doc.exists) {
        nameEl.innerText = "Product not found";
        cartBtn.disabled = true;
        return;
      }

      const p = doc.data();
      nameEl.innerText  = p.name;
      priceEl.innerText = "₹" + p.price;
    })
    .catch(() => {
      nameEl.innerText = "Error loading product";
      cartBtn.disabled = true;
    });
}

/* ADD TO CART (GUEST USER) */
cartBtn.addEventListener("click", () => {

  let uid = localStorage.getItem("drappii_uid");
  if (!uid) {
    uid = "guest_" + Date.now();
    localStorage.setItem("drappii_uid", uid);
  }

  cartBtn.innerText = "Adding...";
  cartBtn.disabled = true;

  db.collection("carts")
    .doc(uid)
    .collection("items")
    .doc(productId)
    .set({
      productId: productId,
      qty: 1,
      addedAt: new Date()
    })
    .then(() => {
      cartBtn.innerText = "Added ✓";
    })
    .catch(() => {
      cartBtn.innerText = "Try again";
      cartBtn.disabled = false;
    });
});
</script>
<!-- 📦 FINAL: ORDER TRACKING TIMELINE (PASTE AT BOTTOM) -->
<style>
.track-box{
  background:#fff;margin:12px;border-radius:12px;
  padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.1)
}
.step{display:flex;align-items:center;margin-bottom:12px}
.dot{
  width:14px;height:14px;border-radius:50%;
  background:#ccc;margin-right:12px
}
.line{
  width:2px;height:22px;background:#ccc;
  margin:0 18px
}
.active .dot{background:#2874f0}
.active .line{background:#2874f0}
.label{font-size:14px}
</style>

<div class="track-box" id="trackBox">
  <b>📦 Order Tracking</b><br><br>
  <div id="timeline">Loading tracking…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
if(!window.__DRAPPII_TRACK__){
  window.__DRAPPII_TRACK__ = true;

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };
  if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // orderId URL se lega ?orderId=XXXX
  const orderId = new URLSearchParams(location.search).get("orderId");
  const steps = ["Placed","Shipped","Out for Delivery","Delivered"];

  if(!orderId){
    document.getElementById("timeline").innerText="Order not found";
  } else {
    db.collection("orders").doc(orderId).onSnapshot(doc=>{
      if(!doc.exists){
        document.getElementById("timeline").innerText="Order not found";
        return;
      }
      const status = doc.data().status || "Placed";
      let html="";
      steps.forEach((s,i)=>{
        const active = steps.indexOf(status)>=i;
        html+=`
          <div class="step ${active?'active':''}">
            <div class="dot"></div>
            <div class="label">${s}</div>
          </div>
          ${i<steps.length-1?`<div class="line ${active?'active':''}"></div>`:""}
        `;
      });
      document.getElementById("timeline").innerHTML = html;
    });
  }
}
</script>
<!-- 📦 END TRACKING -->
<!-- ❤️ FINAL: WISHLIST + PRICE DROP ALERTS (PASTE AT BOTTOM) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* ===== SAFE INIT ===== */
if (!window.__DRAPPII_WISHLIST__) {
  window.__DRAPPII_WISHLIST__ = true;

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  /* ===== HELPERS ===== */
  const qs = new URLSearchParams(location.search);
  const productId = qs.get("id"); // PDP uses ?id=PRODUCT_ID

  // Create a small wishlist button if page has Add to Cart
  function injectWishlistBtn(){
    if (!productId) return;
    if (document.getElementById("wishBtn")) return;

    const btn = document.createElement("button");
    btn.id = "wishBtn";
    btn.innerText = "♡ Wishlist";
    btn.style.cssText = "position:fixed;right:14px;bottom:90px;padding:10px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;z-index:999;";
    document.body.appendChild(btn);

    auth.onAuthStateChanged(user=>{
      if(!user){ btn.innerText="♡ Login to save"; btn.disabled=false; return; }

      const ref = db.collection("wishlists").doc(user.uid).collection("items").doc(productId);
      ref.get().then(d=>{
        btn.innerText = d.exists ? "♥ In Wishlist" : "♡ Wishlist";
      });

      btn.onclick = async ()=>{
        const snap = await ref.get();
        if (snap.exists){
          await ref.delete();
          btn.innerText = "♡ Wishlist";
        } else {
          // store current price snapshot for price-drop alerts
          const pdoc = await db.collection("products").doc(productId).get();
          const price = pdoc.exists ? Number(pdoc.data().price||0) : 0;
          await ref.set({
            productId,
            lastPrice: price,
            addedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          btn.innerText = "♥ In Wishlist";
        }
      };
    });
  }

  /* ===== PRICE DROP WATCHER =====
     When admin reduces product price, notify users who wishlisted it.
     Runs on PDP load (lightweight, real-time). */
  function watchPriceDrop(){
    if (!productId) return;
    db.collection("products").doc(productId).onSnapshot(async pdoc=>{
      if(!pdoc.exists) return;
      const newPrice = Number(pdoc.data().price||0);

      // find all wishlists that contain this product
      const wlSnap = await db.collectionGroup("items")
        .where("productId","==",productId).get();

      wlSnap.forEach(async d=>{
        const data = d.data();
        if (data.lastPrice && newPrice < data.lastPrice){
          const uid = d.ref.parent.parent.id;
          // notify user
          await db.collection("notifications").doc(uid).collection("items").add({
            title: "Price Drop 🎉",
            message: `Price dropped from ₹${data.lastPrice} to ₹${newPrice}`,
            productId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            read:false
          });
          // update stored lastPrice
          await d.ref.update({ lastPrice: newPrice });
        }
      });
    });
  }

  window.addEventListener("load", ()=>{
    injectWishlistBtn();
    watchPriceDrop();
  });
}
</script>
<!-- ❤️ END WISHLIST -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

/* 🔐 SAME FIREBASE CONFIG (JO TUM DE CHUKE HO) */
const firebaseConfig = {
  apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
  authDomain: "fashora-flipkart.firebaseapp.com",
  projectId: "fashora-flipkart",
  storageBucket: "fashora-flipkart.firebasestorage.app",
  messagingSenderId: "383843603520",
  appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🧠 PRODUCT ID URL SE NIKALO (MOST IMPORTANT) */
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

const titleEl = document.getElementById("product-title");
const priceEl = document.getElementById("product-price");
const imageEl = document.getElementById("product-image");

if (!productId) {
  titleEl.innerText = "Invalid product";
  priceEl.innerText = "";
  imageEl.src = "https://cdn-icons-png.flaticon.com/512/2748/2748558.png";
  throw new Error("Product ID missing");
}

/* 🔥 FIRESTORE SE REAL PRODUCT LOAD */
const ref = doc(db, "products", productId);
const snap = await getDoc(ref);

if (!snap.exists()) {
  titleEl.innerText = "Product not found";
  priceEl.innerText = "";
  imageEl.src = "https://cdn-icons-png.flaticon.com/512/2748/2748558.png";
} else {
  const data = snap.data();

  titleEl.innerText = data.name || "Unnamed product";
  priceEl.innerText = "₹" + (data.price || 0);
  imageEl.src = data.image || "https://cdn-icons-png.flaticon.com/512/2748/2748558.png";
}
</script>
