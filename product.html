<script>
/* 🔐 Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
  authDomain: "fashora-flipkart.firebaseapp.com",
  projectId: "fashora-flipkart",
  storageBucket: "fashora-flipkart.firebasestorage.app",
  messagingSenderId: "383843603520",
  appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
};

/* Init Firebase */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* Get product ID from URL */
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

const nameEl  = document.getElementById("pname");
const priceEl = document.getElementById("pprice");
const cartBtn = document.getElementById("addCart");

if (!productId) {
  nameEl.innerText = "Invalid product";
  cartBtn.disabled = true;
} else {
  /* Load product */
  db.collection("products").doc(productId).get()
    .then(doc => {
      if (!doc.exists) {
        nameEl.innerText = "Product not found";
        cartBtn.disabled = true;
        return;
      }

      const p = doc.data();
      nameEl.innerText  = p.name;
      priceEl.innerText = "₹" + p.price;
    })
    .catch(() => {
      nameEl.innerText = "Error loading product";
      cartBtn.disabled = true;
    });
}

/* ADD TO CART (GUEST USER) */
cartBtn.addEventListener("click", () => {

  let uid = localStorage.getItem("drappii_uid");
  if (!uid) {
    uid = "guest_" + Date.now();
    localStorage.setItem("drappii_uid", uid);
  }

  cartBtn.innerText = "Adding...";
  cartBtn.disabled = true;

  db.collection("carts")
    .doc(uid)
    .collection("items")
    .doc(productId)
    .set({
      productId: productId,
      qty: 1,
      addedAt: new Date()
    })
    .then(() => {
      cartBtn.innerText = "Added ✓";
    })
    .catch(() => {
      cartBtn.innerText = "Try again";
      cartBtn.disabled = false;
    });
});
</script>

<script>
if(!window.__DRAPPII_TRACK__){
  window.__DRAPPII_TRACK__ = true;

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };
  if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // orderId URL se lega ?orderId=XXXX
  const orderId = new URLSearchParams(location.search).get("orderId");
  const steps = ["Placed","Shipped","Out for Delivery","Delivered"];

  if(!orderId){
    document.getElementById("timeline").innerText="Order not found";
  } else {
    db.collection("orders").doc(orderId).onSnapshot(doc=>{
      if(!doc.exists){
        document.getElementById("timeline").innerText="Order not found";
        return;
      }
      const status = doc.data().status || "Placed";
      let html="";
      steps.forEach((s,i)=>{
        const active = steps.indexOf(status)>=i;
        html+=`
          <div class="step ${active?'active':''}">
            <div class="dot"></div>
            <div class="label">${s}</div>
          </div>
          ${i<steps.length-1?`<div class="line ${active?'active':''}"></div>`:""}
        `;
      });
      document.getElementById("timeline").innerHTML = html;
    });
  }
}
</script>

<script>
/* ===== SAFE INIT ===== */
if (!window.__DRAPPII_WISHLIST__) {
  window.__DRAPPII_WISHLIST__ = true;

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  /* ===== HELPERS ===== */
  const qs = new URLSearchParams(location.search);
  const productId = qs.get("id"); // PDP uses ?id=PRODUCT_ID

  // Create a small wishlist button if page has Add to Cart
  function injectWishlistBtn(){
    if (!productId) return;
    if (document.getElementById("wishBtn")) return;

    const btn = document.createElement("button");
    btn.id = "wishBtn";
    btn.innerText = "♡ Wishlist";
    btn.style.cssText = "position:fixed;right:14px;bottom:90px;padding:10px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;z-index:999;";
    document.body.appendChild(btn);

    auth.onAuthStateChanged(user=>{
      if(!user){ btn.innerText="♡ Login to save"; btn.disabled=false; return; }

      const ref = db.collection("wishlists").doc(user.uid).collection("items").doc(productId);
      ref.get().then(d=>{
        btn.innerText = d.exists ? "♥ In Wishlist" : "♡ Wishlist";
      });

      btn.onclick = async ()=>{
        const snap = await ref.get();
        if (snap.exists){
          await ref.delete();
          btn.innerText = "♡ Wishlist";
        } else {
          // store current price snapshot for price-drop alerts
          const pdoc = await db.collection("products").doc(productId).get();
          const price = pdoc.exists ? Number(pdoc.data().price||0) : 0;
          await ref.set({
            productId,
            lastPrice: price,
            addedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          btn.innerText = "♥ In Wishlist";
        }
      };
    });
  }

  /* ===== PRICE DROP WATCHER =====
     When admin reduces product price, notify users who wishlisted it.
     Runs on PDP load (lightweight, real-time). */
  function watchPriceDrop(){
    if (!productId) return;
    db.collection("products").doc(productId).onSnapshot(async pdoc=>{
      if(!pdoc.exists) return;
      const newPrice = Number(pdoc.data().price||0);

      // find all wishlists that contain this product
      const wlSnap = await db.collectionGroup("items")
        .where("productId","==",productId).get();

      wlSnap.forEach(async d=>{
        const data = d.data();
        if (data.lastPrice && newPrice < data.lastPrice){
          const uid = d.ref.parent.parent.id;
          // notify user
          await db.collection("notifications").doc(uid).collection("items").add({
            title: "Price Drop 🎉",
            message: `Price dropped from ₹${data.lastPrice} to ₹${newPrice}`,
            productId,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            read:false
          });
          // update stored lastPrice
          await d.ref.update({ lastPrice: newPrice });
        }
      });
    });
  }

  window.addEventListener("load", ()=>{
    injectWishlistBtn();
    watchPriceDrop();
  });
}
</script>
<!-- ❤️ END WISHLIST -->

    );

    await addDoc(collection(db, "orders"), {
      userId: user.uid,
      email: user.email,
      productId,
      productName: name,
      price,
      quantity: 1,
      status: "Placed",
      createdAt: serverTimestamp()
    });

    alert("Order placed");
    location.href = "orders.html";
  };
</script>
