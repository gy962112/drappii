<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | Drapii Luxe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --accent: #9f2089;
            --accent-gradient: linear-gradient(135deg, #9f2089 0%, #ff5e9e 100%);
            --text-main: #121212;
            --text-muted: #757575;
            --bg-page: #fdfdfd;
            --card-radius: 28px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-page); color: var(--text-main); padding-bottom: 120px; }

        /* Luxe Header */
        header { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px);
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .back-btn { font-size: 20px; color: var(--text-main); cursor: pointer; }

        /* Image Slider Upgrade */
        .image-gallery { 
            background: #fff; width: 100%; aspect-ratio: 1/1.25; 
            overflow: hidden; margin-top: 0; position: relative;
            display: flex; /* Change to flex for sliding */
        }
        .slider-container {
            display: flex;
            width: 100%;
            height: 100%;
            overflow-x: scroll;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .slider-container::-webkit-scrollbar { display: none; }
        .slider-item {
            min-width: 100%;
            height: 100%;
            scroll-snap-align: start;
            position: relative;
        }
        .slider-item img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Image Dots */
        .slider-dots {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px; z-index: 20;
        }
        .dot { width: 6px; height: 6px; background: rgba(0,0,0,0.2); border-radius: 50%; transition: 0.3s; }
        .dot.active { width: 20px; border-radius: 10px; background: var(--accent); }

        .image-gallery::after {
            content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 80px;
            background: linear-gradient(transparent, var(--bg-page)); z-index: 15; pointer-events: none;
        }

        /* Content Section */
        .luxe-card { 
            background: #fff; padding: 25px; 
            border-radius: var(--card-radius) var(--card-radius) 0 0;
            margin-top: -30px; position: relative; z-index: 10;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.05);
        }

        .p-title { font-size: 20px; font-weight: 800; color: var(--text-main); line-height: 1.3; margin-bottom: 12px; letter-spacing: -0.5px; }
        
        .price-row { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; }
        .current-price { font-size: 28px; font-weight: 800; color: var(--text-main); }
        .mrp { font-size: 16px; text-decoration: line-through; color: var(--text-muted); font-weight: 400; }
        .discount-pct { 
            font-size: 13px; color: #03a685; font-weight: 800; 
            background: #e6f6f3; padding: 4px 10px; border-radius: 10px;
        }

        /* Size Selector */
        .section-title { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 15px; }
        .variant-chips { display: flex; gap: 12px; margin-bottom: 30px; flex-wrap: wrap; }
        .chip { 
            min-width: 60px; text-align: center; border: 2px solid #f0f0f0; 
            padding: 12px 15px; border-radius: 16px; font-size: 14px; 
            font-weight: 700; cursor: pointer; transition: 0.3s; color: var(--text-muted);
        }
        .chip.selected { border-color: var(--text-main); color: var(--text-main); background: #f9f9f9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* Floating Sticky Footer */
        .sticky-footer { 
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 94%; max-width: 500px; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px);
            display: grid; grid-template-columns: 1fr 1fr; 
            padding: 12px; gap: 12px; border-radius: 24px; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-footer {
            padding: 16px; border: none; border-radius: 18px; 
            font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .cart-btn { background: #f0f0f0; color: #000; border: 1px solid #ddd; }
        .buy-btn { background: var(--text-main); color: #fff; }

        .btn-footer:active { transform: scale(0.95); }
        .btn-footer:disabled { opacity: 0.6; cursor: not-allowed; }

        .fav-btn {
            width: 45px; height: 45px; border-radius: 50%; background: #fff;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); position: absolute;
            top: -22px; right: 25px; font-size: 20px; color: #ff4d4d;
        }
    </style>
</head>
<body>

    <header>
        <i class="fa-solid fa-chevron-left back-btn" onclick="location.href='index.html'"></i>
        <div style="display:flex; gap:20px; font-size:18px;">
            <a href="cart.html" style="color:inherit; position:relative;">
                <i class="fa-solid fa-bag-shopping"></i>
            </a>
        </div>
    </header>

    <div class="image-gallery">
        <div class="slider-container" id="imageSlider">
            </div>
        <div class="slider-dots" id="sliderDots"></div>
    </div>

    <div class="luxe-card">
        <div class="fav-btn"><i class="fa-regular fa-heart"></i></div>
        
        <h1 id="pName" class="p-title">Drapii Luxe Collection</h1>
        
        <div class="price-row">
            <span id="pPrice" class="current-price">₹--</span>
            <span id="pMrp" class="mrp">₹--</span>
            <span id="pDisc" class="discount-pct">26% OFF</span>
        </div>

        <div class="section-title">Selection Size</div>
        <div id="sizeList" class="variant-chips"></div>

        <div class="section-title">Description</div>
        <p id="pDesc" style="font-size:14px; color:var(--text-muted); line-height:1.6; margin-bottom:20px;">
            Loading description...
        </p>
    </div>

    <div class="sticky-footer">
        <button id="addBagBtn" class="btn-footer cart-btn" onclick="addToCart(false)">
            <i class="fa-solid fa-bag-shopping"></i> Bag
        </button>
        <button id="buyNowBtn" class="btn-footer buy-btn" onclick="addToCart(true)">
            Buy Now <i class="fa-solid fa-bolt"></i>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
            authDomain: "fashora-flipkart.firebaseapp.com",
            projectId: "fashora-flipkart",
            storageBucket: "fashora-flipkart.firebasestorage.app",
            messagingSenderId: "383843603520",
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let productData = null;
        let selectedSize = "";
        let firstMainImage = ""; // To store 1st image for cart

        function extractImageUrl(input) {
            if (!input) return "";
            if (input.startsWith('http')) return input.replace(/['"]+/g, '').trim();
            const match = input.match(/src="([^"]+)"/);
            return match ? match[1] : input.replace(/['"]+/g, '').trim();
        }

        window.selectSize = (el) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedSize = el.innerText;
        };

        // Slider Dot Logic
        const slider = document.getElementById('imageSlider');
        slider.addEventListener('scroll', () => {
            const index = Math.round(slider.scrollLeft / slider.offsetWidth);
            document.querySelectorAll('.dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        });

        async function loadProduct() {
            if (!productId) { window.location.href = 'index.html'; return; }
            try {
                const docSnap = await getDoc(doc(db, "products", productId));
                if (docSnap.exists()) {
                    productData = docSnap.data();
                    
                    // --- MULTI-IMAGE SLIDER LOGIC ---
                    // Splits by comma if multiple URLs exist
                    const imageInput = productData.image || "";
                    const imgUrls = imageInput.split(',').map(u => extractImageUrl(u.trim())).filter(u => u !== "");
                    
                    firstMainImage = imgUrls[0]; // Bag/Checkout ke liye pehli photo

                    let sliderHtml = "";
                    let dotsHtml = "";
                    imgUrls.forEach((url, i) => {
                        sliderHtml += `<div class="slider-item"><img src="${url}" alt="Product image"></div>`;
                        dotsHtml += `<div class="dot ${i === 0 ? 'active' : ''}"></div>`;
                    });
                    
                    document.getElementById('imageSlider').innerHTML = sliderHtml;
                    document.getElementById('sliderDots').innerHTML = dotsHtml;
                    // ---------------------------------

                    document.getElementById('pName').innerText = productData.name;
                    document.getElementById('pPrice').innerText = "₹" + Number(productData.price).toLocaleString();
                    
                    if(productData.description) document.getElementById('pDesc').innerText = productData.description;

                    const mrp = Math.round((productData.price || 0) * 1.35);
                    document.getElementById('pMrp').innerText = "₹" + mrp.toLocaleString();

                    if(productData.sizes && productData.sizes.length > 0) {
                        let sizeHtml = "";
                        productData.sizes.forEach((s, index) => {
                            const active = index === 0 ? "selected" : "";
                            if(index === 0) selectedSize = s;
                            sizeHtml += `<div class="chip ${active}" onclick="selectSize(this)">${s}</div>`;
                        });
                        document.getElementById('sizeList').innerHTML = sizeHtml;
                    }
                } else {
                    window.location.href = 'index.html';
                }
            } catch (error) { console.error(error); }
        }

        window.addToCart = async function(isBuyNow) {
            const user = auth.currentUser;
            if (!user) { window.location.href='login.html'; return; }

            const bagBtn = document.getElementById('addBagBtn');
            const buyBtn = document.getElementById('buyNowBtn');
            
            bagBtn.disabled = true;
            buyBtn.disabled = true;

            if(isBuyNow) {
                const directBuyData = {
                    name: productData.name,
                    price: Number(productData.price),
                    image: firstMainImage,
                    size: selectedSize,
                    productId: productId,
                    sellerId: productData.sellerId || "admin", 
                    type: 'direct_buy'
                };
                localStorage.setItem('checkoutItem', JSON.stringify(directBuyData));
                window.location.href = 'checkout.html';
            } else {
                try {
                    await addDoc(collection(db, "carts"), {
                        userId: user.uid,
                        productId: productId,
                        sellerId: productData.sellerId || "admin",
                        name: productData.name,
                        price: Number(productData.price),
                        image: firstMainImage,
                        size: selectedSize,
                        timestamp: serverTimestamp()
                    });
                    window.location.href = 'cart.html';
                } catch (e) {
                    alert("Error: " + e.message);
                    bagBtn.disabled = false;
                    buyBtn.disabled = false;
                }
            }
        };

        loadProduct();
    </script>
</body>
</html>
