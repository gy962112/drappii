<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drapii | Search Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --meesho-pink: #f43397;
            --text-main: #333333;
            --text-sub: #666666;
            --bg-page: #f8f8f8;
            --border: #eeeeee;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { background: var(--bg-page); padding-bottom: 70px; }

        /* --- SEARCH HEADER --- */
        .search-header {
            background: #fff;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .back-btn { font-size: 20px; color: var(--text-main); cursor: pointer; }

        .search-input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 12px;
            color: #999;
        }

        .search-bar {
            width: 100%;
            height: 40px;
            background: #f1f3f4;
            border: none;
            border-radius: 8px;
            padding: 0 12px 0 35px;
            font-size: 14px;
            outline: none;
        }

        /* --- FILTERS --- */
        .filter-strip {
            background: #fff;
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
        }
        .filter-strip::-webkit-scrollbar { display: none; }

        .filter-chip {
            padding: 6px 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-sub);
            background: #fff;
            cursor: pointer;
        }
        .filter-chip.active {
            background: var(--meesho-pink);
            color: #fff;
            border-color: var(--meesho-pink);
        }

        /* --- RESULTS GRID --- */
        .results-container {
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .product-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .p-img { width: 100%; aspect-ratio: 1/1.2; object-fit: cover; }

        .p-info { padding: 10px; }
        .p-name {
            font-size: 13px; color: var(--text-sub);
            height: 34px; overflow: hidden;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            margin-bottom: 6px;
        }
        .p-price { font-size: 16px; font-weight: 800; color: var(--text-main); }
        
        .p-delivery {
            font-size: 10px; color: #03a685; font-weight: 700;
            background: #e6f6f3; padding: 2px 6px; border-radius: 4px;
            margin-top: 6px; display: inline-block;
        }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center; padding: 50px 20px; color: #999;
        }
        .empty-state i { font-size: 50px; margin-bottom: 15px; display: block; }

        /* --- BOTTOM NAV --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 60px;
            background: #fff; display: flex; justify-content: space-around;
            align-items: center; border-top: 1px solid var(--border);
        }
        .nav-item { text-align: center; text-decoration: none; color: #888; font-size: 11px; }
        .nav-item.active { color: var(--meesho-pink); }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }

    </style>
</head>
<body>

    <header class="search-header">
        <i class="fa-solid fa-arrow-left back-btn" onclick="location.href='index.html'"></i>
        <div class="search-input-wrapper">
            <i class="fa fa-search"></i>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search for Kurtis, Sarees or Brands..." autofocus>
        </div>
    </header>

    <div class="filter-strip" id="filterStrip">
        <div class="filter-chip active" data-cat="All">All</div>
        <div class="filter-chip" data-cat="Kurtis">Kurtis</div>
        <div class="filter-chip" data-cat="Sarees">Sarees</div>
        <div class="filter-chip" data-cat="Jewellery">Jewellery</div>
        <div class="filter-chip" data-cat="Men">Men</div>
        <div class="filter-chip" data-cat="Beauty">Beauty</div>
    </div>

    <div id="resultsGrid" class="results-container">
        </div>

    <div id="emptyState" class="empty-state" style="display: none;">
        <i class="fa-solid fa-magnifying-glass"></i>
        <p>No products found for your search.</p>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
        <a href="search.html" class="nav-item active"><i class="fa-solid fa-layer-group"></i>Category</a>
        <a href="orders.html" class="nav-item"><i class="fa-solid fa-bag-shopping"></i>Orders</a>
        <a href="profile.html" class="nav-item"><i class="fa-regular fa-user"></i>Account</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
            authDomain: "fashora-flipkart.firebaseapp.com",
            projectId: "fashora-flipkart",
            storageBucket: "fashora-flipkart.firebasestorage.app",
            messagingSenderId: "383843603520",
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allProducts = [];
        let activeCategory = "All";

        // 1. AUTH GUARD
        onAuthStateChanged(auth, (user) => {
            if (!user) window.location.href = "login.html";
            else loadInitialProducts();
        });

        // 2. LOAD PRODUCTS
        async function loadInitialProducts() {
            const snap = await getDocs(collection(db, "products"));
            allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            // Check if URL has a category parameter (e.g., from index.html)
            const urlParams = new URLSearchParams(window.location.search);
            const catParam = urlParams.get('cat');
            if(catParam) {
                activeCategory = catParam;
                updateFilterUI(catParam);
            }
            
            renderProducts(allProducts);
        }

        // 3. RENDER LOGIC
        function renderProducts(products) {
            const grid = document.getElementById('resultsGrid');
            const empty = document.getElementById('emptyState');
            
            let filtered = products;
            
            // Filter by Category
            if (activeCategory !== "All") {
                filtered = filtered.filter(p => p.category === activeCategory);
            }

            // Filter by Search Query
            const queryText = document.getElementById('searchInput').value.toLowerCase();
            if (queryText) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(queryText) || 
                    (p.category && p.category.toLowerCase().includes(queryText))
                );
            }

            grid.innerHTML = "";
            if (filtered.length === 0) {
                empty.style.display = "block";
                return;
            }

            empty.style.display = "none";
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card" onclick="location.href='product.html?id=${p.id}'">
                        <img src="${p.image}" class="p-img" loading="lazy">
                        <div class="p-info">
                            <p class="p-name">${p.name}</p>
                            <p class="p-price">₹${p.price}</p>
                            <span class="p-delivery">3-Hour Delivery</span>
                        </div>
                    </div>
                `;
            });
        }

        // 4. EVENT LISTENERS
        document.getElementById('searchInput').addEventListener('input', () => {
            renderProducts(allProducts);
        });

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                activeCategory = e.target.dataset.cat;
                updateFilterUI(activeCategory);
                renderProducts(allProducts);
            });
        });

        function updateFilterUI(cat) {
            document.querySelectorAll('.filter-chip').forEach(c => {
                c.classList.remove('active');
                if(c.dataset.cat === cat) c.classList.add('active');
            });
        }
    </script>
</body>
</html>
