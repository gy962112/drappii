<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Drapii Luxe</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --accent: #9f2089;
            --premium-black: #121212;
            --delivery-red: #ff3333;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #fff0f7, #f8f9fb);
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            padding: 40px 25px;
            border-radius: 40px;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.12);
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.8);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* Delivery Animation Line - Red Hot */
        .delivery-promise {
            color: var(--delivery-red);
            font-weight: 800;
            font-size: 18px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: pulse-red 1.5s infinite;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; text-shadow: 0 0 0px rgba(255,51,51,0); }
            50% { transform: scale(1.05); opacity: 0.8; text-shadow: 0 0 15px rgba(255,51,51,0.5); }
            100% { transform: scale(1); opacity: 1; text-shadow: 0 0 0px rgba(255,51,51,0); }
        }

        .icon-box {
            position: relative;
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
        }

        .icon-circle {
            width: 100%;
            height: 100%;
            background: var(--premium-black);
            color: white;
            border-radius: 35% 65% 70% 30% / 30% 30% 70% 70%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            animation: morph 6s linear infinite alternate;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        @keyframes morph {
            0% { border-radius: 35% 65% 70% 30% / 30% 30% 70% 70%; }
            100% { border-radius: 65% 35% 30% 70% / 70% 70% 30% 30%; }
        }

        h1 { 
            color: var(--premium-black); 
            font-size: 26px; 
            font-weight: 800; 
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        p { 
            color: #666; 
            line-height: 1.6; 
            margin-bottom: 30px; 
            font-size: 14px;
            font-weight: 500;
        }
        
        .order-badge {
            background: #fdf0f9;
            color: var(--accent);
            padding: 10px 20px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-track {
            background: var(--premium-black);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-home {
            background: transparent;
            color: var(--premium-black);
            text-decoration: none;
            padding: 16px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 15px;
            border: 2px solid #eee;
            transition: 0.3s;
        }

        .btn-track:active, .btn-home:active { transform: scale(0.96); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="delivery-promise">
            <i class="fa-solid fa-bolt-lightning"></i>
            Delivered in 3 Hours
        </div>

        <div class="icon-box">
            <div class="icon-circle">
                <i class="fa-solid fa-crown"></i>
            </div>
        </div>

        <h1>Order Confirmed!</h1>
        <p>Your high-end selection from <b>Drapii Luxe</b> is being curated. Get ready for an ultra-fast delivery experience.</p>
        
        <div class="order-badge">
            <i class="fa-solid fa-hashtag"></i>
            ID: DRP-<span id="oid">774922</span>
        </div>

        <div class="action-buttons">
            <a href="orders.html" class="btn-track">
                <i class="fa-solid fa-location-crosshairs"></i> Track Order Status
            </a>
            <a href="index.html" class="btn-home">Continue Shopping</a>
        </div>
    </div>

    <script>
        function launchConfetti() {
            var end = Date.now() + (2 * 1000);
            var colors = ['#9f2089', '#ff3333', '#ffffff'];

            (function frame() {
                confetti({
                    particleCount: 2,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 2,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        window.onload = () => {
            launchConfetti();
            document.getElementById('oid').innerText = Math.floor(100000 + Math.random() * 900000);
        };
    </script>
</body>
</html>
