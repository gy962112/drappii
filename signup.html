<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drapii | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --accent: #9f2089;
            --accent-gradient: linear-gradient(135deg, #9f2089 0%, #ff5e9e 100%);
            --text-main: #1a1a1a;
            --text-muted: #757575;
            --white: #ffffff;
            --bg-soft: #fcfcfc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-soft); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* Luxury Hero Banner */
        .banner-container {
            width: 100%;
            height: 300px;
            background: url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .banner-container::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), var(--bg-soft));
        }

        /* Float Card */
        .auth-card {
            background: var(--white);
            width: 90%;
            max-width: 400px;
            margin: -80px 20px 30px;
            border-radius: 32px;
            padding: 45px 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.08);
            position: relative; z-index: 100;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .logo-txt {
            font-size: 38px; font-weight: 800; text-align: center;
            background: var(--accent-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; letter-spacing: -2px; margin-bottom: 10px;
        }

        .sub-txt { text-align: center; font-size: 14px; color: var(--text-muted); margin-bottom: 40px; font-weight: 500; }

        /* Modern Inputs */
        .input-group {
            background: #f8f8f8; border-radius: 18px;
            padding: 18px 22px; display: flex; align-items: center; margin-bottom: 25px;
            border: 1.5px solid transparent; transition: 0.3s;
        }
        .input-group:focus-within { border-color: var(--accent); background: #fff; box-shadow: 0 8px 20px rgba(159, 32, 137, 0.05); }
        .input-group span { font-weight: 800; margin-right: 12px; color: var(--text-main); font-size: 16px; }
        .input-group input { border: none; outline: none; font-size: 16px; width: 100%; font-weight: 600; background: transparent; color: var(--text-main); }

        .btn-main {
            width: 100%; background: var(--text-main); color: white;
            border: none; padding: 20px; border-radius: 20px;
            font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 5px;
            transition: 0.3s; letter-spacing: 0.5px;
        }
        .btn-main:active { transform: scale(0.96); }
        .btn-main:disabled { background: #e0e0e0; color: #aaa; cursor: not-allowed; }

        /* Step Animations */
        .view { display: none; }
        .view.active { display: block; animation: luxeFadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes luxeFadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* OTP Grid */
        .otp-inputs { display: flex; justify-content: space-between; margin: 30px 0; gap: 10px; }
        .otp-field { width: 100%; height: 55px; background: #f8f8f8; border: 1.5px solid transparent; border-radius: 14px; text-align: center; font-size: 24px; font-weight: 800; color: var(--accent); transition: 0.3s; }
        .otp-field:focus { border-color: var(--accent); background: #fff; outline: none; }

        .resend-box { text-align: center; margin-bottom: 30px; font-size: 13px; font-weight: 700; }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); color: #fff; 
            padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 600; 
            display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="banner-container"></div>

<div class="auth-card">
    <div class="logo-txt">Drapii</div>
    <div class="sub-txt">Exclusive Boutique Access</div>

    <div id="view-phone" class="view active">
        <div class="input-group">
            <span>+91</span>
            <input type="tel" id="mobile-input" placeholder="Mobile Number" maxlength="10">
        </div>
        <div id="recaptcha-container"></div>
        <button class="btn-main" id="send-otp-btn" disabled>Send OTP</button>
        <p style="text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 25px; line-height: 1.5;">
            By continuing, you agree to our <br><b>Terms of Service</b> & <b>Privacy Policy</b>
        </p>
    </div>

    <div id="view-otp" class="view">
        <h3 style="margin-bottom: 8px; font-weight: 800;">Verification</h3>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 25px;">Code sent to +91 <span id="display-num" style="color: var(--text-main); font-weight: 800;"></span></p>
        
        <div class="otp-inputs">
            <input type="tel" class="otp-field" maxlength="1">
            <input type="tel" class="otp-field" maxlength="1">
            <input type="tel" class="otp-field" maxlength="1">
            <input type="tel" class="otp-field" maxlength="1">
            <input type="tel" class="otp-field" maxlength="1">
            <input type="tel" class="otp-field" maxlength="1">
        </div>

        <div class="resend-box">
            <span id="timer-label" style="color: var(--text-muted);">Resend code in </span>
            <span id="otp-timer" style="color: var(--accent);">00:30</span>
            <button id="resend-btn" onclick="resendOTP()" style="display: none; background: none; border: none; color: var(--accent); font-weight: 800; cursor: pointer; text-decoration: underline;">Resend OTP</button>
        </div>

        <button class="btn-main" id="verify-otp-btn">Verify & Login</button>
    </div>

    <div id="view-profile" class="view">
        <h3 style="font-weight: 800; margin-bottom: 10px;">Welcome to Drapii</h3>
        <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 30px;">How should we address you?</p>
        
        <div class="input-group">
            <input type="text" id="full-name" placeholder="Enter Your Name">
        </div>
        <button class="btn-main" id="finish-btn">Start Exploring</button>
    </div>
</div>

<div id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q", 
        authDomain: "fashora-flipkart.firebaseapp.com", 
        projectId: "fashora-flipkart", 
        storageBucket: "fashora-flipkart.firebasestorage.app", 
        messagingSenderId: "383843603520", 
        appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let confirmationResult = null;
    let timerInterval;

    const showToast = (m) => { 
        const t = document.getElementById('toast'); 
        t.innerText = m; t.style.display = 'block'; 
        setTimeout(() => t.style.display = 'none', 3000); 
    };

    function startTimer() {
        let seconds = 30;
        const timerDisplay = document.getElementById('otp-timer');
        const timerLabel = document.getElementById('timer-label');
        const resendBtn = document.getElementById('resend-btn');
        resendBtn.style.display = 'none';
        timerDisplay.style.display = 'inline';
        timerLabel.style.display = 'inline';
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            seconds--;
            timerDisplay.innerText = `00:${seconds < 10 ? '0' + seconds : seconds}`;
            if (seconds <= 0) {
                clearInterval(timerInterval);
                resendBtn.style.display = 'inline';
                timerDisplay.style.display = 'none';
                timerLabel.style.display = 'none';
            }
        }, 1000);
    }

    const mobileInput = document.getElementById('mobile-input');
    const sendBtn = document.getElementById('send-otp-btn');
    mobileInput.oninput = () => sendBtn.disabled = mobileInput.value.length !== 10;

    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });

    sendBtn.onclick = async () => {
        try {
            const phone = "+91" + mobileInput.value;
            confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
            document.getElementById('display-num').innerText = mobileInput.value;
            document.getElementById('view-phone').classList.remove('active');
            document.getElementById('view-otp').classList.add('active');
            startTimer();
        } catch (e) { showToast("Login failed. Try again."); }
    };

    window.resendOTP = async () => {
        try {
            const phone = "+91" + mobileInput.value;
            confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
            showToast("OTP Resent!");
            startTimer();
        } catch (e) { showToast("Please wait."); }
    };

    const otpFields = document.querySelectorAll('.otp-field');
    otpFields.forEach((f, i) => {
        f.oninput = () => { if(f.value && i < 5) otpFields[i+1].focus(); };
        f.onkeydown = (e) => { if(e.key === "Backspace" && !f.value && i > 0) otpFields[i-1].focus(); };
    });

    document.getElementById('verify-otp-btn').onclick = async () => {
        const code = Array.from(otpFields).map(f => f.value).join('');
        if(code.length < 6) return showToast("Enter 6-digit OTP");
        try {
            const result = await confirmationResult.confirm(code);
            const user = result.user;

            // Check if user already exists in Firestore
            const userDoc = await getDoc(doc(db, "users", user.uid));
            
            if (userDoc.exists()) {
                // Agar user hai toh seedha home page
                window.location.href = "index.html";
            } else {
                // Agar naya user hai toh naam pucho
                document.getElementById('view-otp').classList.remove('active');
                document.getElementById('view-profile').classList.add('active');
            }
        } catch (e) { showToast("Invalid OTP code."); }
    };

    document.getElementById('finish-btn').onclick = async () => {
        const name = document.getElementById('full-name').value;
        if(!name) return showToast("Name is required");
        try {
            const user = auth.currentUser;
            await setDoc(doc(db, "users", user.uid), {
                name, 
                phone: user.phoneNumber, 
                role: 'user', // Default role is user
                uid: user.uid, 
                createdAt: serverTimestamp()
            });
            window.location.href = "index.html";
        } catch (e) { showToast("Error saving data"); }
    };
</script>
</body>
</html>
