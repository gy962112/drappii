<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drappii – My Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <meta name="description" content="Drappii – My Orders">
  <meta name="robots" content="noindex">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f3f6;
    }
<div id="ordersList"></div>
    .header {
      background: #2874f0;
      color: #fff;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .orders {
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .order-card {
      background: #fff;
      border-radius: 6px;
      padding: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }

    .order-top {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #555;
    }

    .order-id {
      font-weight: bold;
      color: #000;
    }

    .items {
      margin-top: 10px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      font-weight: bold;
      color: green;
    }

    .empty {
      padding: 40px;
      text-align: center;
      color: #777;
      font-size: 15px;
    }
  </style>
</head>

<body>

<div class="header">📦 My Orders</div>
<div id="orders" class="orders"></div>

<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, query, where, orderBy } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  /* 🔥 FIREBASE CONFIG (same project as category) */
  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const box = document.getElementById("orders");

  /* 🔐 AUTH GUARD (Flipkart style) */
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      location.href = "login.html";
      return;
    }

    try {
      const q = query(
        collection(db, "orders"),
        where("uid", "==", user.uid),
        orderBy("createdAt", "desc")
      );

      const snap = await getDocs(q);

      if (snap.empty) {
        box.innerHTML = `<div class="empty">No orders found</div>`;
        return;
      }

      snap.forEach(doc => {
        const o = doc.data();

        const card = document.createElement("div");
        card.className = "order-card";

        const itemsHtml = (o.items || []).map(i => `
          <div class="item">
            <span>${i.name} × ${i.qty || 1}</span>
            <span>₹${i.price}</span>
          </div>
        `).join("");

        card.innerHTML = `
          <div class="order-top">
            <div class="order-id">Order #${doc.id.slice(0,8)}</div>
            <div>₹${o.total || 0}</div>
          </div>

          <div class="items">${itemsHtml}</div>

          <div class="status">
            Status: ${o.status || "Placed"}
          </div>
        `;

        box.appendChild(card);
      });

    } catch (err) {
      console.error(err);
      box.innerHTML = `<div class="empty">Error loading orders</div>`;
    }
  });
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, query, where, orderBy, onSnapshot } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const user = JSON.parse(localStorage.getItem("drappiiUser"));
  if (!user) location.href = "login.html";

  const q = query(
    collection(db, "orders"),
    where("userId", "==", user.uid),
    orderBy("createdAt", "desc")
  );

  onSnapshot(q, snap => {
    const box = document.getElementById("ordersList");
    box.innerHTML = "";

    if (snap.empty) {
      box.innerHTML = "<p>No orders found</p>";
      return;
    }

    snap.forEach(d => {
      const o = d.data();
      box.innerHTML += `
        <div class="order-card">
          <b>${o.productName}</b><br>
          ₹${o.price}<br>
          Status: <span style="color:green">${o.status}</span>
        </div>
      `;
    });
  });
</script>
</body>
</html>
