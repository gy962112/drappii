<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drappii – My Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f1f3f6;
}

/* HEADER */
header{
  background:#2874f0;
  color:#fff;
  padding:12px;
  font-size:20px;
}

/* ORDER LIST */
.orders{
  padding:12px;
}

.order{
  background:#fff;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.order h4{
  margin:0 0 6px;
}

.status{
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  font-size:13px;
  margin-bottom:8px;
}

.Placed{background:#e6f0ff;color:#2874f0}
.Delivered{background:#e8f5e9;color:#2e7d32}
.Cancelled{background:#ffebee;color:#c62828}

.item{
  font-size:14px;
  margin-bottom:4px;
}

.total{
  margin-top:8px;
  font-weight:bold;
}
.empty{
  text-align:center;
  color:#555;
  margin-top:40px;
}
</style>
</head>

<body>

<header>📦 My Orders</header>

<div class="orders" id="ordersBox">
  Loading orders...
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
  authDomain: "fashora-flipkart.firebaseapp.com",
  projectId: "fashora-flipkart",
  storageBucket: "fashora-flipkart.firebasestorage.app",
  messagingSenderId: "383843603520",
  appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* USER (guest supported) */
let uid = localStorage.getItem("drappii_uid");
if(!uid){
  uid="guest_"+Date.now();
  localStorage.setItem("drappii_uid",uid);
}

const box=document.getElementById("ordersBox");

/* LOAD ORDERS */
db.collection("orders")
  .where("uid","==",uid)
  .orderBy("createdAt","desc")
  .get()
  .then(snapshot=>{
    box.innerHTML="";
    if(snapshot.empty){
      box.innerHTML='<div class="empty">No orders yet</div>';
      return;
    }

    snapshot.forEach(doc=>{
      const o=doc.data();
      const div=document.createElement("div");
      div.className="order";

      let itemsHTML="";
      o.items.forEach(it=>{
        itemsHTML+=`<div class="item">• ${it.name} (₹${it.price})</div>`;
      });

      const date=o.createdAt?.toDate
        ? o.createdAt.toDate().toLocaleString()
        : "";

      div.innerHTML=`
        <h4>Order ID: ${doc.id}</h4>
        <div class="status ${o.status}">${o.status}</div>
        <div style="font-size:13px;color:#555">${date}</div>
        <div>${itemsHTML}</div>
        <div class="total">Total: ₹${o.total}</div>
      `;

      box.appendChild(div);
    });
  })
  .catch(()=>{
    box.innerHTML="Error loading orders";
  });
</script>
<!-- 💳 FINAL: RAZORPAY CHECKOUT (PASTE AT BOTTOM) -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* ===== SAFE INIT (run once) ===== */
if (!window.__DRAPPII_PAY__) {
  window.__DRAPPII_PAY__ = true;

  /* Firebase (same project) */
  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db   = firebase.firestore();

  /* ===== CONFIG ===== */
  const RAZORPAY_KEY = "rzp_test_XXXXXXXXXXXX"; // 🔁 replace with your key
  const BRAND_NAME   = "Drappii";
  const BRAND_LOGO   = "https://via.placeholder.com/128"; // optional

  /* ===== HELPER: open checkout ===== */
  window.startPayment = async function({
    amountINR,          // number (e.g., 999)
    items = [],         // [{name, price}]
    notes = {}          // optional
  }) {
    const user = auth.currentUser;
    if (!user) { alert("Please login first"); return; }

    const options = {
      key: RAZORPAY_KEY,
      amount: Math.round(amountINR * 100), // paise
      currency: "INR",
      name: BRAND_NAME,
      description: "Order Payment",
      image: BRAND_LOGO,
      handler: async function (response) {
        // ✅ PAYMENT SUCCESS → SAVE ORDER
        const orderRef = await db.collection("orders").add({
          uid: user.uid,
          items,
          total: amountINR,
          status: "Placed",
          payment: {
            provider: "razorpay",
            razorpay_payment_id: response.razorpay_payment_id
          },
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Optional: clear cart if exists
        try {
          const cartSnap = await db.collection("carts")
            .doc(user.uid).collection("items").get();
          const batch = db.batch();
          cartSnap.forEach(d=>batch.delete(d.ref));
          await batch.commit();
        } catch(e){}

        alert("Payment successful! Order placed.");
        // redirect if you want:
        // location.href = "orders.html";
      },
      prefill: {
        name: user.displayName || "Customer",
        email: user.email || ""
      },
      notes,
      theme: { color: "#2874f0" }
    };

    const rzp = new Razorpay(options);
    rzp.on('payment.failed', function () {
      alert("Payment failed. Try again.");
    });
    rzp.open();
  };

  /* ===== AUTO BIND (optional) =====
     Add a button with:
     <button id="payNow">Pay Now</button>
     And dataset:
     <button id="payNow" data-amount="999">Pay</button>
  */
  document.addEventListener("click", (e)=>{
    const btn = e.target.closest("[data-pay]");
    if (!btn) return;
    const amount = Number(btn.getAttribute("data-amount") || 0);
    const items  = JSON.parse(btn.getAttribute("data-items") || "[]");
    if (!amount) return alert("Amount missing");
    startPayment({ amountINR: amount, items });
  });
}
</script>
<!-- 💳 END FINAL -->

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, updateDoc } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // ⏳ Wait for orders to render
  setTimeout(async () => {
    const user = auth.currentUser;
    if (!user) return;

    const snap = await getDocs(collection(db, "orders"));

    document.querySelectorAll(".order").forEach(async (orderEl) => {
      if (orderEl.dataset.statusReady) return;
      orderEl.dataset.statusReady = "yes";

      const orderId = orderEl.getAttribute("data-id");
      if (!orderId) return;

      // 🔽 Status dropdown
      const select = document.createElement("select");
      select.style.cssText = `
        margin-top:8px;
        padding:6px;
        border-radius:6px;
      `;
      select.innerHTML = `
        <option value="Placed">Placed</option>
        <option value="Shipped">Shipped</option>
        <option value="Delivered">Delivered</option>
      `;

      orderEl.appendChild(select);

      // 🔄 Load current status
      snap.forEach(d => {
        if (d.id === orderId) {
          select.value = d.data().status || "Placed";
        }
      });

      // 🔥 Update status in Firestore
      select.onchange = async () => {
        await updateDoc(doc(db, "orders", orderId), {
          status: select.value
        });
        alert("Order status updated to " + select.value);
      };
    });
  }, 1200);
  </script>
</body>
