<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drappii – Category</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <meta name="description" content="Drappii – Shop mobiles, fashion, electronics & more.">
  <meta name="robots" content="index, follow">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f3f6;
    }

    /* HEADER */
    .header {
      background: #2874f0;
      color: #fff;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
    }

    /* FILTER BAR */
    .filters {
      background: #fff;
      padding: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      box-shadow: 0 2px 4px rgba(0,0,0,.1);
    }

    .filters input,
    .filters select {
      flex: 1;
      min-width: 90px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .filters button {
      padding: 8px 14px;
      background: #2874f0;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* PRODUCTS GRID */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 12px;
    }

    .card {
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: contain;
      background: #fff;
    }

    .card-body {
      padding: 10px;
    }

    .name {
      font-size: 14px;
      font-weight: 600;
    }

    .price {
      color: green;
      font-weight: bold;
      margin-top: 4px;
    }

    /* CART ICON */
    .cart {
      position: fixed;
      top: 14px;
      right: 14px;
      background: #fff;
      border-radius: 20px;
      padding: 6px 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
      font-size: 14px;
      cursor: pointer;
      z-index: 9999;
    }

    .cart span {
      background: red;
      color: #fff;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: 12px;
      margin-left: 4px;
    }
  </style>
</head>

<body>

  <div class="header">← Category</div>

  <div class="filters">
    <input id="search" placeholder="Search">
    <input id="min" type="number" placeholder="Min ₹">
    <input id="max" type="number" placeholder="Max ₹">
    <select id="sort">
      <option value="">Sort</option>
      <option value="low">Price ↑</option>
      <option value="high">Price ↓</option>
    </select>
    <button id="apply">Apply</button>
  </div>

  <div id="products" class="products"></div>

  <div class="cart" onclick="location.href='cart.html'">
    🛒 <span id="cartCount">0</span>
  </div>

  <!-- FIREBASE + LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } 
      from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
      authDomain: "fashora-flipkart.firebaseapp.com",
      projectId: "fashora-flipkart",
      storageBucket: "fashora-flipkart.firebasestorage.app",
      messagingSenderId: "383843603520",
      appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const box = document.getElementById("products");
    const search = document.getElementById("search");
    const min = document.getElementById("min");
    const max = document.getElementById("max");
    const sort = document.getElementById("sort");
    const apply = document.getElementById("apply");

    async function loadProducts() {
      box.innerHTML = "";

      let q = collection(db, "products");
      if (sort.value === "low") q = query(q, orderBy("price", "asc"));
      if (sort.value === "high") q = query(q, orderBy("price", "desc"));

      const snap = await getDocs(q);

      snap.forEach(d => {
        const p = d.data();

        if (search.value && !p.name.toLowerCase().includes(search.value.toLowerCase())) return;
        if (min.value && p.price < min.value) return;
        if (max.value && p.price > max.value) return;

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${p.image}">
          <div class="card-body">
            <div class="name">${p.name}</div>
            <div class="price">₹${p.price}</div>
          </div>
        `;
        box.appendChild(card);
      });
    }

    apply.onclick = loadProducts;
    loadProducts();
  </script>

</body>
</html>
