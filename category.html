<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drappii – Category</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f1f3f6;
}

header{
  background:#2874f0;
  color:white;
  padding:12px;
  font-size:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.products{
  padding:12px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.card{
  background:#fff;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  cursor:pointer;
}

.card b{
  display:block;
  margin-bottom:6px;
}
</style>
</head>

<body>

<header>
  ← Category
</header>

<div class="products" id="products">
  Loading products...
</div>

<!-- 🔥 FIREBASE (STABLE COMPAT SDK) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
/* 🔐 Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
  authDomain: "fashora-flipkart.firebaseapp.com",
  projectId: "fashora-flipkart",
  storageBucket: "fashora-flipkart.firebasestorage.app",
  messagingSenderId: "383843603520",
  appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
};

/* Init */
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* Read category from URL */
const params = new URLSearchParams(window.location.search);
const activeCategory = params.get("cat");

/* UI target */
const productBox = document.getElementById("products");

/* Load products */
db.collection("products").get()
.then(snapshot => {
  productBox.innerHTML = "";

  if (snapshot.empty) {
    productBox.innerHTML = "No products found";
    return;
  }

  let found = false;

  snapshot.forEach(doc => {
    const p = doc.data();

    if (
      activeCategory &&
      p.category &&
      p.category.toLowerCase() === activeCategory.toLowerCase()
    ) {
      found = true;

      const card = document.createElement("div");
      card.className = "card";
      card.setAttribute("data-id", doc.id);

      card.innerHTML = `
        <b>${p.name}</b>
        <span>₹${p.price}</span>
      `;

      card.onclick = () => {
        window.location.href = "product.html?id=" + doc.id;
      };

      productBox.appendChild(card);
    }
  });

  if (!found) {
    productBox.innerHTML = "No products found";
  }
})
.catch(err => {
  productBox.innerHTML = "Error loading products";
  console.error(err);
});
</script>
<!-- ===================================== -->
<!-- 🔥 CATEGORY AUTO-FIX PATCH (NO EDIT) -->
<!-- ===================================== -->

<script>
(function () {
  // wait until page + old scripts load
  window.addEventListener("load", function () {

    // find products container (fallback safe)
    const box =
      document.getElementById("products") ||
      document.querySelector(".products");

    if (!box) return;

    // force reset UI (override old stuck state)
    box.innerHTML = "Loading products...";

    // read category safely
    const params = new URLSearchParams(window.location.search);
    const activeCategory = params.get("cat");

    // use existing firebase instance (no re-init crash)
    if (!window.firebase || !firebase.firestore) {
      box.innerHTML = "Firebase not ready";
      return;
    }

    const db = firebase.firestore();

    // HARD reload products (ignore old logic)
    db.collection("products").get()
      .then(snapshot => {
        box.innerHTML = "";

        if (snapshot.empty) {
          box.innerHTML = "No products in database";
          return;
        }

        let shown = 0;

        snapshot.forEach(doc => {
          const p = doc.data();

          // 🔥 show ALL if category missing
          if (
            !activeCategory ||
            (p.category &&
              p.category.toLowerCase() === activeCategory.toLowerCase())
          ) {
            const card = document.createElement("div");
            card.className = "card";
            card.style.cursor = "pointer";

            card.innerHTML = `
              <b>${p.name || "Unnamed product"}</b>
              <span>₹${p.price || ""}</span>
            `;

            card.onclick = () => {
              window.location.href =
                "product.html?id=" + doc.id;
            };

            box.appendChild(card);
            shown++;
          }
        });

        if (shown === 0) {
          box.innerHTML = "No products found";
        }
      })
      .catch(err => {
        console.error(err);
        box.innerHTML = "Error loading products";
      });
  });
})();
</script>
</body>
</html>
