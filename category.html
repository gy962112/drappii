<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Drappii – Category</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f1f3f6;
}

.header {
  background: #2874f0;
  color: white;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-body {
  padding: 10px;
}

.name {
  font-size: 14px;
  font-weight: 600;
}

.price {
  color: green;
  font-weight: bold;
  margin-top: 4px;
}
</style>
</head>

<body>

<div class="header">← Category</div>

<!-- 🔥 THIS WAS MISSING BEFORE -->
<div id="products" class="products"></div>

<script type="module">
import { initializeApp, getApps } from
"https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";

import { getFirestore, collection, getDocs } from
"https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
  authDomain: "fashora-flipkart.firebaseapp.com",
  projectId: "fashora-flipkart",
  storageBucket: "fashora-flipkart.firebasestorage.app",
  messagingSenderId: "383843603520",
  appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
};

const app = getApps().length
  ? getApps()[0]
  : initializeApp(firebaseConfig);

const db = getFirestore(app);

const productsBox = document.getElementById("products");

const PLACEHOLDER =
"https://via.placeholder.com/300x200?text=Product";

const snapshot = await getDocs(collection(db, "products"));

snapshot.forEach(doc => {
  const d = doc.data();

  const name = d.name || d.title || "Product";
  const price = Number(d.price || 0);
  const image = d.image || d.imageUrl || PLACEHOLDER;

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${image}" onerror="this.src='${PLACEHOLDER}'">
    <div class="card-body">
      <div class="name">${name}</div>
      <div class="price">₹${price}</div>
    </div>
  `;

  productsBox.appendChild(card);
});
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5",
    measurementId: "G-NTRGF0TDVZ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 🔐 AUTH GUARD (Flipkart style)
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login.html";
    }
  });
</script>
</body>
</html>
