<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Drappii – Category</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f1f3f6;
}

.header {
  background: #2874f0;
  color: white;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-body {
  padding: 10px;
}

.name {
  font-size: 14px;
  font-weight: 600;
}

.price {
  color: green;
  font-weight: bold;
  margin-top: 4px;
}
</style>
</head>

<body>

<div class="header">← Category</div>

<!-- 🔥 THIS WAS MISSING BEFORE -->
<div id="products" class="products"></div>

<script type="module">
import { initializeApp, getApps } from
"https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";

import { getFirestore, collection, getDocs } from
"https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
  authDomain: "fashora-flipkart.firebaseapp.com",
  projectId: "fashora-flipkart",
  storageBucket: "fashora-flipkart.firebasestorage.app",
  messagingSenderId: "383843603520",
  appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
};

const app = getApps().length
  ? getApps()[0]
  : initializeApp(firebaseConfig);

const db = getFirestore(app);

const productsBox = document.getElementById("products");

const PLACEHOLDER =
"https://via.placeholder.com/300x200?text=Product";

const snapshot = await getDocs(collection(db, "products"));

snapshot.forEach(doc => {
  const d = doc.data();

  const name = d.name || d.title || "Product";
  const price = Number(d.price || 0);
  const image = d.image || d.imageUrl || PLACEHOLDER;

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${image}" onerror="this.src='${PLACEHOLDER}'">
    <div class="card-body">
      <div class="name">${name}</div>
      <div class="price">₹${price}</div>
    </div>
  `;

  productsBox.appendChild(card);
});
</script>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, getDocs } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 🔵 Create cart icon (auto inject)
  const cartIcon = document.createElement("div");
  cartIcon.style.cssText = `
    position:fixed;
    top:14px;
    right:16px;
    background:#fff;
    border-radius:20px;
    padding:6px 10px;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    cursor:pointer;
    z-index:9999;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:6px;
  `;
  cartIcon.innerHTML = `
    🛒 <span id="cartCount"
      style="
        background:#ff3f6c;
        color:#fff;
        border-radius:50%;
        padding:2px 6px;
        font-size:12px;
        display:none;
      ">0</span>
  `;
  document.body.appendChild(cartIcon);

  cartIcon.onclick = () => {
    location.href = "cart.html";
  };

  // 🔄 Update cart count
  onAuthStateChanged(auth, async (user) => {
    if (!user) return;

    const snap = await getDocs(
      collection(db, "carts", user.uid, "items")
    );

    let count = 0;
    snap.forEach(doc => {
      const d = doc.data();
      count += d.qty || 1;
    });

    const badge = document.getElementById("cartCount");
    if (count > 0) {
      badge.innerText = count;
      badge.style.display = "inline-block";
    } else {
      badge.style.display = "none";
    }
  });
  </script>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where, orderBy } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  /* ======================
     UI BAR (AUTO ADD)
     ====================== */
  const bar = document.createElement("div");
  bar.style.cssText = `
    background:#fff;
    padding:10px;
    display:flex;
    gap:6px;
    position:sticky;
    top:0;
    z-index:999;
    box-shadow:0 2px 4px rgba(0,0,0,.1);
  `;
  bar.innerHTML = `
    <input id="searchBox" placeholder="Search products"
      style="flex:2;padding:8px;border:1px solid #ccc;border-radius:6px">
    <input id="minP" placeholder="Min ₹" type="number"
      style="width:80px;padding:8px;border:1px solid #ccc;border-radius:6px">
    <input id="maxP" placeholder="Max ₹" type="number"
      style="width:80px;padding:8px;border:1px solid #ccc;border-radius:6px">
    <select id="sort"
      style="padding:8px;border:1px solid #ccc;border-radius:6px">
      <option value="">Sort</option>
      <option value="low">Price ↑</option>
      <option value="high">Price ↓</option>
    </select>
    <button id="apply"
      style="padding:8px 10px;background:#2874f0;color:#fff;border:none;border-radius:6px">
      Apply
    </button>
  `;
  document.body.prepend(bar);

  /* ======================
     FILTER LOGIC
     ====================== */
  const params = new URLSearchParams(location.search);
  const category = params.get("cat");

  const applyBtn = document.getElementById("apply");
  applyBtn.onclick = async () => {
    let q = collection(db, "products");

    const filters = [];
    if (category) filters.push(where("category", "==", category));

    const min = Number(minP.value);
    const max = Number(maxP.value);

    if (min) filters.push(where("price", ">=", min));
    if (max) filters.push(where("price", "<=", max));

    let sortVal = sort.value;
    let q2 = filters.length ? query(q, ...filters) : q;

    if (sortVal === "low") q2 = query(q2, orderBy("price", "asc"));
    if (sortVal === "high") q2 = query(q2, orderBy("price", "desc"));

    const snap = await getDocs(q2);

    // 🔄 Clear old products
    document.querySelectorAll(".product").forEach(p => p.remove());

    // 🔍 Search keyword
    const key = searchBox.value.toLowerCase();

    snap.forEach(d => {
      const p = d.data();
      if (key && !p.name.toLowerCase().includes(key)) return;

      const card = document.createElement("div");
      card.className = "product";
      card.innerHTML = `
        <img src="${p.image}" style="width:100%;height:150px;object-fit:contain">
        <div>${p.name}</div>
        <b>₹${p.price}</b>
      `;
      card.onclick = () => {
        location.href = "product.html?id=" + d.id;
      };

      document.body.appendChild(card);
    });
  };
  </script>
</body>
</html>
