<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details | Drapii</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --drapii-pink: #f43397;
            --drapii-black: #333333;
            --drapii-gray: #666666;
            --success-green: #03a685;
            --border-color: #eeeeee;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { background: #f8f8f8; color: var(--drapii-black); padding-bottom: 90px; }
        
        header { background: #fff; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-color); }
        .back-btn { font-size: 20px; color: var(--drapii-black); cursor: pointer; }

        .image-gallery { background: #fff; width: 100%; aspect-ratio: 1/1.25; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .image-gallery img { width: 100%; height: 100%; object-fit: cover; }

        .content-card { background: #fff; padding: 16px; margin-bottom: 8px; }
        .p-title { font-size: 16px; font-weight: 500; color: var(--drapii-gray); line-height: 1.4; margin-bottom: 8px; }
        .price-row { display: flex; align-items: baseline; gap: 10px; }
        .current-price { font-size: 24px; font-weight: 800; }
        .mrp { font-size: 14px; text-decoration: line-through; color: var(--drapii-gray); }
        .discount-pct { font-size: 14px; color: var(--success-green); font-weight: 700; }

        .variant-chips { display: flex; gap: 10px; margin-top: 10px; }
        .chip { border: 1px solid #ddd; padding: 8px 16px; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .chip.selected { border-color: var(--drapii-pink); color: var(--drapii-pink); background: #fff1f8; font-weight: 800; }

        /* --- STICKY FOOTER UPDATED --- */
        .sticky-footer { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; align-items: center; padding: 10px 16px; gap: 10px; border-top: 1px solid var(--border-color); z-index: 1000; height: 70px; }
        
        .cart-btn { flex: 1; background: #fff; color: var(--drapii-pink); border: 1.5px solid var(--drapii-pink); height: 48px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .buy-now-btn { flex: 1; background: var(--drapii-pink); color: #fff; border: none; height: 48px; border-radius: 8px; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        .buy-now-btn:disabled, .cart-btn:disabled { background: #ccc; border-color: #ccc; color: #fff; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <i class="fa fa-arrow-left back-btn" onclick="history.back()"></i>
        <div style="display:flex; gap:20px; font-size:18px;">
            <i class="fa-regular fa-heart"></i>
            <a href="cart.html" style="color:inherit;"><i class="fa-solid fa-cart-shopping"></i></a>
        </div>
    </header>

    <div class="image-gallery">
        <img id="mainImg" src="https://via.placeholder.com/400x500?text=Loading..." alt="Product Image">
    </div>

    <div class="content-card">
        <h1 id="pName" class="p-title">Drapii Special Product</h1>
        <div class="price-row">
            <span id="pPrice" class="current-price">₹--</span>
            <span id="pMrp" class="mrp">₹--</span>
            <span id="pDisc" class="discount-pct">--% off</span>
        </div>
        <p style="font-size: 12px; color: var(--success-green); font-weight: 700; margin-top: 5px;">Special Price for you</p>
    </div>

    <div class="content-card">
        <h3 style="font-size:14px; margin-bottom:10px;">Select Size</h3>
        <div class="variant-chips">
            <div class="chip" onclick="selectSize(this)">S</div>
            <div class="chip selected" onclick="selectSize(this)">M</div>
            <div class="chip" onclick="selectSize(this)">L</div>
            <div class="chip" onclick="selectSize(this)">XL</div>
        </div>
    </div>

    <div class="sticky-footer">
        <button id="cartBtn" class="cart-btn" onclick="processCart('cart')">
            <i class="fa-solid fa-cart-plus"></i> Add to Cart
        </button>
        <button id="buyBtn" class="buy-now-btn" onclick="processCart('buy')">
            <i class="fa-solid fa-bolt"></i> Buy Now
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
            authDomain: "fashora-flipkart.firebaseapp.com",
            projectId: "fashora-flipkart",
            storageBucket: "fashora-flipkart.firebasestorage.app",
            messagingSenderId: "383843603520",
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let productData = null;
        let selectedSize = "M";

        window.selectSize = (el) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedSize = el.innerText;
        };

        async function loadProduct() {
            if (!productId) return;
            try {
                const docSnap = await getDoc(doc(db, "products", productId));
                if (docSnap.exists()) {
                    productData = docSnap.data();
                    let cleanImg = (productData.image || "").replace(/['"]+/g, '').trim(); 
                    
                    document.getElementById('mainImg').src = cleanImg || "https://via.placeholder.com/400x500?text=No+Image";
                    document.getElementById('pName').innerText = productData.name;
                    document.getElementById('pPrice').innerText = "₹" + productData.price;
                    
                    const mrp = Math.round(productData.price * 1.4);
                    document.getElementById('pMrp').innerText = "₹" + mrp;
                    document.getElementById('pDisc').innerText = "30% off";
                }
            } catch (error) { console.error(error); }
        }

        window.processCart = async function(actionType) {
            const user = auth.currentUser;
            if (!user) { alert("Please login first!"); window.location.href='login.html'; return; }

            const cartBtn = document.getElementById('cartBtn');
            const buyBtn = document.getElementById('buyBtn');
            
            // Disable buttons during process
            cartBtn.disabled = true;
            buyBtn.disabled = true;

            try {
                const cartData = {
                    userId: user.uid,
                    productId: productId,
                    name: productData.name,
                    price: Number(productData.price),
                    image: productData.image.replace(/['"]+/g, ''),
                    size: selectedSize,
                    timestamp: new Date()
                };

                await addDoc(collection(db, "carts"), cartData);

                if (actionType === 'buy') {
                    window.location.href = 'cart.html';
                } else {
                    alert("Added to cart successfully! 🛒");
                    cartBtn.disabled = false;
                    buyBtn.disabled = false;
                }
            } catch (e) {
                alert("Error: " + e.message);
                cartBtn.disabled = false;
                buyBtn.disabled = false;
            }
        };

        loadProduct();
    </script>
</body>
</html>
