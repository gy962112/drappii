<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drappii – Online Shopping</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Drappii – Shop mobiles, fashion, electronics & more">
  <meta name="keywords" content="Drappii, online shopping, mobiles, fashion">
  <meta name="robots" content="index, follow">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f3f6;
    }

    /* HEADER */
    .header {
      background: #2874f0;
      color: #fff;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
    }

    /* BANNERS */
    .banners {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
      background: #fff;
    }

    .banners img {
      min-width: 90%;
      border-radius: 8px;
    }

    /* CATEGORIES */
    .section-title {
      padding: 10px;
      font-weight: bold;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px,1fr));
      gap: 10px;
      padding: 10px;
    }

    .cat {
      background: #fff;
      padding: 10px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }

    /* FLOAT ICONS */
    .float {
      position: fixed;
      top: 14px;
      background: #fff;
      border-radius: 20px;
      padding: 6px 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
      font-size: 14px;
      cursor: pointer;
      z-index: 9999;
    }

    #cart { right: 14px; }
    #orders { right: 60px; }
  </style>
</head>

<body>

<div class="header">Drappii</div>

<div class="banners" id="banners"></div>

<div class="section-title">Shop by Category</div>

<div class="categories">
  <div class="cat" onclick="location.href='category.html?cat=mobiles'">Mobiles</div>
  <div class="cat" onclick="location.href='category.html?cat=fashion'">Fashion</div>
  <div class="cat" onclick="location.href='category.html?cat=electronics'">Electronics</div>
  <div class="cat" onclick="location.href='category.html?cat=beauty'">Beauty</div>
</div>

<div id="cart" class="float" onclick="location.href='cart.html'">🛒</div>
<div id="orders" class="float" onclick="location.href='orders.html'">📦</div>

<!-- 🔽 ALL LOGIC – ONLY ONE FIREBASE INIT -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, getDocs } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  /* 🔐 AUTH GUARD – ONLY HERE */
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.replace("login.html");
    }
  });

  /* 🔄 LOAD BANNERS */
  const bannersBox = document.getElementById("banners");
  const snap = await getDocs(collection(db, "banners"));

  snap.forEach(d => {
    const b = d.data();
    if (!b.active) return;
    const img = document.createElement("img");
    img.src = b.image;
    img.onclick = () => b.link && (location.href = b.link);
    bannersBox.appendChild(img);
  });
</script>

</body>
</html>
