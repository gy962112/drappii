<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drapii Luxe | Elite Shopping</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --accent: #9f2089;
            --accent-gradient: linear-gradient(135deg, #9f2089 0%, #ff5e9e 100%);
            --glass: rgba(255, 255, 255, 0.85);
            --bg: #fdfdfd;
            --text-main: #121212;
            --text-muted: #757575;
            --card-radius: 24px;
        }

        /* --- AUTH LOADING SCREEN --- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 9999; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
        }
        .loader {
            width: 45px; height: 45px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); padding-bottom: 100px; color: var(--text-main); overflow-x: hidden; display: none; }

        header { 
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; padding: 15px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-size: 28px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1.5px; text-decoration: none; }
        
        .header-actions { display: flex; gap: 18px; align-items: center; }
        .icon-btn { position: relative; font-size: 22px; color: var(--text-main); cursor: pointer; }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; font-size: 10px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; }

        .search-container { position: relative; }
        .search-input { width: 100%; padding: 14px 18px 14px 48px; border: none; border-radius: 16px; font-size: 14px; background: #f1f3f6; outline: none; }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 16px; }

        /* --- SLIDER BANNER CSS UPDATED --- */
        .banner-container { padding: 10px 0; position: relative; overflow: hidden; }
        .slider-wrapper { 
            display: flex; 
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            width: 100%;
            padding: 0 20px;
            gap: 15px; /* Added gap between slides */
        }
        .banner { 
            min-width: calc(100vw - 40px); /* Adjust width to account for padding/gap */
            height: 180px; border-radius: var(--card-radius); 
            background-color: #eee;
            position: relative; overflow: hidden; display: flex; align-items: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        .banner-content { 
            position: absolute; left: 0; bottom: 0; padding: 25px; 
            z-index: 5; color: white; width: 100%; 
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent); 
            display: flex; flex-direction: column; justify-content: flex-end;
            height: 100%;
        }
        .banner-img { position: absolute; left: 0; top: 0; height: 100%; width: 100%; z-index: 1; object-fit: cover; }
        
        .slider-dots {
            display: flex; justify: center; gap: 5px; margin-top: 10px;
            justify-content: center;
        }
        .dot { width: 6px; height: 6px; background: #ddd; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--accent); width: 20px; border-radius: 10px; }

        .filter-row { display: flex; overflow-x: auto; padding: 10px 20px; gap: 10px; scrollbar-width: none; }
        .chip { padding: 8px 16px; border-radius: 12px; background: #fff; border: 1px solid #eee; font-size: 12px; font-weight: 700; color: #666; white-space: nowrap; cursor: pointer; }
        .chip.active { background: var(--text-main); color: #fff; border-color: var(--text-main); }

        .section-label { padding: 25px 20px 15px; display: flex; justify-content: space-between; align-items: flex-end; }
        .section-label h3 { font-size: 20px; font-weight: 800; }

        .cat-row { display: flex; overflow-x: auto; padding: 0 20px; gap: 20px; scrollbar-width: none; }
        .cat-card { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 75px; cursor: pointer; }
        .cat-circle { width: 72px; height: 72px; border-radius: 24px; background: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.04); }
        .cat-circle img { width: 45px; height: 45px; object-fit: contain; }

        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px 20px; }
        .p-card { background: #fff; border-radius: var(--card-radius); overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.03); position: relative; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .p-img-box { width: 100%; aspect-ratio: 1/1.3; background: #f9f9f9; }
        .p-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .p-details { padding: 15px; }
        .p-name { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .curr-price { font-size: 18px; font-weight: 800; color: #000; }
        .stars { background: #121212; color: #fff; font-size: 10px; padding: 4px 8px; border-radius: 8px; font-weight: 700; width: fit-content; margin-top: 5px; }

        .float-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(18, 18, 18, 0.95); height: 65px; border-radius: 22px; display: flex; justify-content: space-around; align-items: center; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .nav-link { color: #888; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 600; gap: 4px; transition: 0.3s; }
        .nav-link.active { color: #fff; }
        .nav-link.seller-hub { color: #ffd700; }
        .nav-link i { font-size: 20px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="loader"></div>
        <p style="font-weight: 600; color: #666;">Securing Connection...</p>
    </div>

    <header>
        <div class="header-top">
            <a href="index.html" class="logo">Drapii</a>
            <div class="header-actions">
                <i class="fa-regular fa-heart icon-btn"></i>
                <a href="cart.html" class="icon-btn">
                    <i class="fa-solid fa-bag-shopping"></i>
                    <span class="badge" id="cartBadge">0</span>
                </a>
            </div>
        </div>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search elite fashion...">
        </div>
    </header>

    <div class="filter-row">
        <div class="chip active" onclick="sortProducts('all', this)">All</div>
        <div class="chip" onclick="sortProducts('low', this)">Price: Low to High</div>
        <div class="chip" onclick="sortProducts('high', this)">Price: High to Low</div>
        <div class="chip" onclick="filterByPrice(500, this)">Under ₹500</div>
        <div class="chip" onclick="filterByPrice(1000, this)">Under ₹1000</div>
    </div>

    <div class="banner-container">
        <div class="slider-wrapper" id="sliderWrapper"></div>
        <div class="slider-dots" id="sliderDots"></div>
    </div>

    <div class="section-label">
        <h3>Designers</h3>
        <span onclick="filterByCategory('All')">Explore All</span>
    </div>
    <div class="cat-row" id="categoryStrip"></div>

    <div class="section-label">
        <h3 id="displayTitle">Trending Now</h3>
    </div>
    
    <div class="product-grid" id="productGrid"></div>

    <nav class="float-nav">
        <a href="index.html" class="nav-link active"><i class="fa-solid fa-house-chimney"></i><span>Home</span></a>
        <a href="seller-auth.html" class="nav-link seller-hub"><i class="fa-solid fa-warehouse"></i><span>Seller Hub</span></a>
        <a href="orders.html" class="nav-link"><i class="fa-solid fa-receipt"></i><span>Orders</span></a>
        <a href="profile.html" class="nav-link"><i class="fa-regular fa-user"></i><span>Account</span></a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
            authDomain: "fashora-flipkart.firebaseapp.com",
            projectId: "fashora-flipkart",
            storageBucket: "fashora-flipkart.firebasestorage.app",
            messagingSenderId: "383843603520",
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.body.style.display = 'block';
                updateCartBadge(user.uid);
                listenToBanner(); 
                loadProducts();
            } else {
                window.location.replace("signup.html");
            }
        });

        let allProducts = [];
        let filteredProducts = [];

        async function updateCartBadge(uid) {
            const q = query(collection(db, "carts"), where("userId", "==", uid));
            const snap = await getDocs(q);
            document.getElementById('cartBadge').innerText = snap.size;
        }

        // --- SLIDER LOGIC UPDATED FOR GAPS ---
        let currentSlide = 0;
        function initSlider() {
            const wrapper = document.getElementById('sliderWrapper');
            const dots = document.querySelectorAll('.dot');
            const totalSlides = document.querySelectorAll('.banner').length;

            if(totalSlides <= 1) return;

            setInterval(() => {
                currentSlide = (currentSlide + 1) % totalSlides;
                // Move by 100% of container + gap
                const moveWidth = document.querySelector('.banner').offsetWidth + 15;
                wrapper.style.transform = `translateX(-${currentSlide * moveWidth}px)`;
                
                dots.forEach((dot, index) => {
                    dot.classList.toggle('active', index === currentSlide);
                });
            }, 4000);
        }

        function listenToBanner() {
            onSnapshot(collection(db, "banners"), (snap) => {
                const wrapper = document.getElementById('sliderWrapper');
                const dotsContainer = document.getElementById('sliderDots');
                wrapper.innerHTML = "";
                dotsContainer.innerHTML = "";

                if (snap.empty) {
                    wrapper.innerHTML = `<div class="banner"><div class="banner-content"><h2>Welcome</h2></div></div>`;
                    return;
                }

                let indexCounter = 0;
                snap.forEach((doc) => {
                    const d = doc.data();
                    
                    // FIX: Skip blank slides that have no image
                    if(!d.image || d.image.trim() === "") return;

                    const bannerHtml = `
                        <div class="banner">
                            <div class="banner-content">
                                <h2>${d.title || ""}</h2>
                                <p>${d.subtitle || ""}</p>
                            </div>
                            <img src="${d.image}" class="banner-img">
                        </div>`;
                    wrapper.insertAdjacentHTML('beforeend', bannerHtml);
                    
                    const dot = document.createElement('div');
                    dot.className = indexCounter === 0 ? 'dot active' : 'dot';
                    dotsContainer.appendChild(dot);
                    indexCounter++;
                });

                currentSlide = 0;
                if(indexCounter > 0) initSlider();
            });
        }

        const categories = [
            { name: "Kurtis", img: "https://cdn-icons-png.flaticon.com/512/3531/3531744.png" },
            { name: "Sarees", img: "https://cdn-icons-png.flaticon.com/512/9307/9307849.png" },
            { name: "Western", img: "https://cdn-icons-png.flaticon.com/512/3050/3050253.png" },
            { name: "Men", img: "https://cdn-icons-png.flaticon.com/512/263/263142.png" },
            { name: "Jewellery", img: "https://cdn-icons-png.flaticon.com/512/3050/3050239.png" }
        ];

        const catStrip = document.getElementById('categoryStrip');
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-card';
            btn.onclick = () => filterByCategory(cat.name);
            btn.innerHTML = `<div class="cat-circle"><img src="${cat.img}"></div><span>${cat.name}</span>`;
            catStrip.appendChild(btn);
        });

        async function loadProducts() {
            const snap = await getDocs(collection(db, "products"));
            allProducts = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            filteredProducts = [...allProducts];
            renderProducts(filteredProducts);
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = "";
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'p-card';
                card.onclick = () => window.location.href = `product.html?id=${p.id}`;
                card.innerHTML = `
                    <div class="p-img-box"><img src="${p.image}"></div>
                    <div class="p-details">
                        <p class="p-name">${p.name}</p>
                        <span class="curr-price">₹${p.price}</span>
                        <div class="stars">4.5 ★</div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        window.sortProducts = (type, el) => {
            updateChips(el);
            if(type === 'low') filteredProducts.sort((a,b) => a.price - b.price);
            else if(type === 'high') filteredProducts.sort((a,b) => b.price - a.price);
            else filteredProducts = [...allProducts];
            renderProducts(filteredProducts);
        };

        window.filterByPrice = (maxPrice, el) => {
            updateChips(el);
            filteredProducts = allProducts.filter(p => p.price <= maxPrice);
            renderProducts(filteredProducts);
        };

        window.filterByCategory = (cat) => {
            filteredProducts = cat === 'All' ? allProducts : allProducts.filter(p => p.category === cat);
            renderProducts(filteredProducts);
        };

        function updateChips(el) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
