<div class="box">
  <h2 id="title">Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="link" onclick="toggle()">Create new account</div>

  <div class="msg" id="msg"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

  // ✅ YOUR REAL FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let isLogin = true;

  // 🔁 Toggle Login / Signup
  window.toggle = function () {
    isLogin = !isLogin;
    document.getElementById("title").innerText = isLogin ? "Login" : "Signup";
    document.querySelector("button").innerText = isLogin ? "Login" : "Signup";
    document.querySelector(".link").innerText =
      isLogin ? "Create new account" : "Already have an account?";
    document.getElementById("msg").innerText = "";
  };

  // 🔐 Login / Signup Function
  window.login = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    if (!email || !password) {
      msg.innerText = "Email aur password dono bharo";
      msg.className = "msg error";
      return;
    }

    if (isLogin) {
      // LOGIN
      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          msg.innerText = "✅ Login successful";
          msg.className = "msg";
        })
        .catch(err => {
          msg.innerText = err.message;
          msg.className = "msg error";
        });
    } else {
      // SIGNUP
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          msg.innerText = "✅ Account created successfully";
          msg.className = "msg";
        })
        .catch(err => {
          msg.innerText = err.message;
          msg.className = "msg error";
        });
    }
  };
  // ===============================
// 🔐 PRO AUTH STATE HANDLER
// ===============================

// 1️⃣ Agar user already login hai → seedha home
import { onAuthStateChanged } from
  "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

onAuthStateChanged(auth, (user) => {
  if (user) {
    // Professional redirect (no loop)
    setTimeout(() => {
      window.location.replace("home.html");
    }, 300);
  }
});

// 2️⃣ Signup ke baad auto redirect (SAFE WRAPPER)
const originalSignup = window.login;

  const password = document.getElementById("password").value;

  if (!email || !password) {

      .catch(err => {

};

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, query, where, getDocs, updateDoc, doc } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 🔔 Bell icon
  const bell = document.createElement("div");
  bell.style.cssText = `
    position:fixed;
    top:14px;
    right:60px;
    background:#fff;
    border-radius:20px;
    padding:6px 10px;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    cursor:pointer;
    z-index:9999;
    font-size:14px;
  `;
  bell.innerHTML = `🔔 <span id="nCount"
    style="background:#ff3f6c;color:#fff;border-radius:50%;
    padding:2px 6px;font-size:12px;display:none">0</span>`;
  document.body.appendChild(bell);

  // 🔔 Panel
  const panel = document.createElement("div");
  panel.style.cssText = `
    position:fixed;
    top:54px;
    right:16px;
    width:280px;
    max-height:60vh;
    overflow:auto;
    background:#fff;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
    display:none;
    z-index:9999;
  `;
  document.body.appendChild(panel);

  bell.onclick = () => {
    panel.style.display = panel.style.display === "none" ? "block" : "none";
  };

  onAuthStateChanged(auth, async (user) => {
    if (!user) return;

    const q = query(
      collection(db, "notifications"),
      where("uid", "in", [user.uid, "all"])
    );

    const snap = await getDocs(q);
    let unread = 0;
    panel.innerHTML = "";

    snap.forEach(d => {
      const n = d.data();
      if (!n.read) unread++;

      const item = document.createElement("div");
      item.style.cssText = `
        padding:10px;
        border-bottom:1px solid #eee;
        font-size:13px;
        ${n.read ? "" : "background:#f1f8ff"}
      `;
      item.innerHTML = `
        <b>${n.title}</b><br>
        <span>${n.message}</span>
      `;
      item.onclick = async () => {
        await updateDoc(doc(db,"notifications",d.id),{read:true});
        location.reload();
      };
      panel.appendChild(item);
    });

    const badge = document.getElementById("nCount");
    if (unread > 0) {
      badge.innerText = unread;
      badge.style.display = "inline-block";
    }
  });
  </script>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, getDocs } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 🔵 Create cart icon (auto inject)
  const cartIcon = document.createElement("div");
  cartIcon.style.cssText = `
    position:fixed;
    top:14px;
    right:16px;
    background:#fff;
    border-radius:20px;
    padding:6px 10px;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    cursor:pointer;
    z-index:9999;
    font-size:14px;
    display:flex;
    align-items:center;
    gap:6px;
  `;
  cartIcon.innerHTML = `
    🛒 <span id="cartCount"
      style="
        background:#ff3f6c;
        color:#fff;
        border-radius:50%;
        padding:2px 6px;
        font-size:12px;
        display:none;
      ">0</span>
  `;
  document.body.appendChild(cartIcon);

  cartIcon.onclick = () => {
    location.href = "cart.html";
  };

  // 🔄 Update cart count
  onAuthStateChanged(auth, async (user) => {
    if (!user) return;

    const snap = await getDocs(
      collection(db, "carts", user.uid, "items")
    );

    let count = 0;
    snap.forEach(doc => {
      const d = doc.data();
      count += d.qty || 1;
    });

    const badge = document.getElementById("cartCount");
    if (count > 0) {
      badge.innerText = count;
      badge.style.display = "inline-block";
    } else {
      badge.style.display = "none";
    }
  });
  </script>
