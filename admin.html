<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Drappii – Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f3f6;
    }

    .header {
      background: #2874f0;
      color: #fff;
      padding: 14px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }

    h3 {
      margin-top: 0;
      color: #333;
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #fb641b;
      border: none;
      color: #fff;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #e65c1a;
    }

    .msg {
      text-align: center;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .success { color: green; }
    .error { color: red; }

    .note {
      font-size: 13px;
      color: #555;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="header">Admin Panel – Drappii</div>

<div class="container">
  <h3>Add / Update Product</h3>

  <div id="msg" class="msg"></div>

  <input type="text" id="name" placeholder="Product Name" />
  <input type="number" id="price" placeholder="Price (₹)" />
  <input type="text" id="image" placeholder="Image URL" />

  <select id="category">
    <option value="">Select Category</option>
    <option value="mobiles">Mobiles</option>
    <option value="fashion">Fashion</option>
    <option value="electronics">Electronics</option>
    <option value="beauty">Beauty</option>
  </select>

  <button id="saveBtn">Save Product</button>

  <div class="note">
    Only logged-in admin users should access this page.
  </div>
</div>

<!-- 🔽 SINGLE FIREBASE INIT + ADMIN LOGIC -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, serverTimestamp } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  /* 🔐 AUTH GUARD – ONLY LOGGED-IN USER */
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.replace("login.html");
    }
  });

  /* ➕ ADD PRODUCT */
  document.getElementById("saveBtn").onclick = async () => {
    const name = document.getElementById("name").value.trim();
    const price = Number(document.getElementById("price").value);
    const image = document.getElementById("image").value.trim();
    const category = document.getElementById("category").value;
    const msg = document.getElementById("msg");

    msg.innerText = "";
    msg.className = "msg";

    if (!name || !price || !image || !category) {
      msg.innerText = "Please fill all fields";
      msg.classList.add("error");
      return;
    }

    try {
      await addDoc(collection(db, "products"), {
        name,
        price,
        image,
        category,
        createdAt: serverTimestamp()
      });

      msg.innerText = "✅ Product saved successfully";
      msg.classList.add("success");

      document.getElementById("name").value = "";
      document.getElementById("price").value = "";
      document.getElementById("image").value = "";
      document.getElementById("category").value = "";

    } catch (err) {
      msg.innerText = err.message;
      msg.classList.add("error");
    }
  };
</script>

</body>
</html>
