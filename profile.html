<!DOCTYPE html>
<html>
  <!-- SEO META -->
<meta name="description" content="Drappii – Shop mobiles, fashion, electronics & more. Fast delivery, best deals.">
<meta name="keywords" content="Drappii, online shopping, mobiles, fashion, electronics">
<meta name="robots" content="index, follow">

<!-- Open Graph (Social share) -->
<meta property="og:title" content="Drappii – Online Shopping">
<meta property="og:description" content="Best deals on mobiles, fashion, electronics.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://via.placeholder.com/1200x630">
<meta property="og:url" content="">
<head>
  <meta charset="UTF-8">
  <title>My Account – Drappii</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:Arial;background:#f1f3f6;margin:0}
    header{background:#2874f0;color:#fff;padding:14px;font-size:18px}
    .box{background:#fff;margin:12px;padding:12px;border-radius:8px}
    .row{margin:8px 0}
    input,button{
      width:100%;padding:10px;margin-top:6px;
      border-radius:6px;border:1px solid #ccc;font-size:14px
    }
    button{background:#fb641b;color:#fff;border:none}
    .link-btn{
      background:#fff;border:1px solid #2874f0;color:#2874f0
    }
    .muted{color:#666;font-size:13px}
  </style>
</head>

<body>

<header>My Account</header>

<div class="box">
  <div class="row"><b>Email:</b> <span id="email"></span></div>
  <div class="row muted">User ID: <span id="uid"></span></div>
</div>

<div class="box">
  <h3>Profile Details</h3>
  <input id="name" placeholder="Full Name">
  <input id="phone" placeholder="Phone Number">
  <button id="save">Save Profile</button>
</div>

<div class="box">
  <button class="link-btn" onclick="location.href='orders.html'">📦 My Orders</button>
  <button class="link-btn" onclick="location.href='cart.html'" style="margin-top:8px">🛒 My Cart</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } 
    from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
    authDomain: "fashora-flipkart.firebaseapp.com",
    projectId: "fashora-flipkart",
    storageBucket: "fashora-flipkart.firebasestorage.app",
    messagingSenderId: "383843603520",
    appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user)=>{
    if(!user){
      location.href="login.html";
      return;
    }

    email.innerText = user.email;
    uid.innerText = user.uid;

    const ref = doc(db,"users",user.uid);
    const snap = await getDoc(ref);
    if(snap.exists()){
      const d = snap.data();
      name.value = d.name || "";
      phone.value = d.phone || "";
    }

    save.onclick = async ()=>{
      await setDoc(ref,{
        name: name.value,
        phone: phone.value,
        email: user.email
      },{merge:true});
      alert("Profile updated");
    };
  });
</script>

</body>
</html>
