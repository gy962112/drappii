name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Purge Java 21 (Zad Se Khatam)
        run: |
          # Yeh server par se Java 21 ko poori tarah uda dega taaki plugins isse pick na kar sakein
          sudo rm -rf /usr/lib/jvm/temurin-21-amd64
          sudo rm -rf /usr/lib/jvm/zulu-21-amd64
          echo "JAVA_HOME_21_X64=" >> $GITHUB_ENV

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon -x lint -x test
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
