name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle' # Yeh automatic purane cache ka lafda khatam karega

      - name: Install Dependencies
        run: npm install

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean # Pehle purani cache ko poora clean karega
          ./gradlew assembleRelease -x lint -x test
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }} # Core Java path ko project par force karega

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Drapii-App-APK
          path: android/app/build/outputs/apk/release/*.apk
