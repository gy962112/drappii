name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Fix Missing AppCompat Version Variable
        run: |
          # Yeh command direct app/build.gradle mein missing variable ko stable version se replace kar degi
          sed -i 's/\$androidxAppCompatVersion/1.6.1/g' android/app/build.gradle || true
          sed -i 's/androidxAppCompatVersion/1.6.1/g' android/app/build.gradle || true

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon -x lint -x test
