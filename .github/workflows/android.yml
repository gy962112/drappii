name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.0'
          cache-disabled: true # Yeh GitHub ke us kharab cache ko band kar dega jo baar-baar block kar raha hai

      - name: Install Dependencies
        run: npm install

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          # --no-build-cache se plugins naye sire se build honge aur generic class cache wala error nahi aayega
          ./gradlew assembleRelease --no-build-cache -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Drapii-App-APK
          path: android/app/build/outputs/apk/release/*.apk
