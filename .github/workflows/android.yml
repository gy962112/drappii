name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        id: setup-java
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Yeh main line direct Gradle ke andar Java 17 ka home path inject kar degi
          ./gradlew assembleRelease -Dorg.gradle.java.home="${{ env.JAVA_HOME_17_X64 }}" --no-daemon -x lint -x test
