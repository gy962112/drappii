name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Pure server par Java 17 lock karega
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          # --no-daemon se java 21 ka background clash khatam ho jayega
          ./gradlew assembleRelease --no-daemon -x lint -x test
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }} # Java 17 ka core path force karega
