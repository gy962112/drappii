name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: npm install

      - name: Force Android SDK 34 (Fix Version Error)
        run: |
          # Yeh command pure project mein jahan bhi compile ya target SDK 33 hoga use automatically 34 kar degi
          find . -name "build.gradle" -o -name "variables.gradle" | xargs sed -i 's/compileSdkVersion = 33/compileSdkVersion = 34/g' 2>/dev/null || true
          find . -name "build.gradle" -o -name "variables.gradle" | xargs sed -i 's/targetSdkVersion = 33/targetSdkVersion = 34/g' 2>/dev/null || true
          find . -name "build.gradle" -o -name "variables.gradle" | xargs sed -i 's/compileSdk 33/compileSdk 34/g' 2>/dev/null || true
          find . -name "build.gradle" -o -name "variables.gradle" | xargs sed -i 's/targetSdk 33/targetSdk 34/g' 2>/dev/null || true

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon -x lint -x test
