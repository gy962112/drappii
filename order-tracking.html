<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Order | Drapii Luxe</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #9f2089; 
            --accent-light: #fdf2fb;
            --gray: #94a3b8; 
            --success: #10b981; 
            --dark: #1e293b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            margin: 0; 
            padding: 15px; 
            color: var(--dark);
        }

        .track-container { 
            max-width: 450px; 
            margin: 20px auto; 
        }

        .back-btn {
            border: none; background: white; width: 40px; height: 40px;
            border-radius: 12px; cursor: pointer; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex;
            align-items: center; justify-content: center; color: var(--dark);
        }

        .track-card { 
            background: white; 
            padding: 25px; 
            border-radius: 28px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.04); 
            position: relative;
            overflow: hidden;
        }

        .track-header { margin-bottom: 25px; }
        h2 { font-weight: 800; font-size: 22px; margin-bottom: 5px; letter-spacing: -0.5px; }
        .order-id { 
            color: var(--accent); 
            font-size: 13px; 
            font-weight: 700; 
            background: var(--accent-light);
            padding: 5px 12px;
            border-radius: 8px;
            display: inline-block;
        }

        .product-mini-card {
            display: flex; align-items: center; gap: 15px;
            background: #f1f5f9; padding: 12px;
            border-radius: 18px; margin-bottom: 30px;
        }
        .product-mini-card img {
            width: 50px; height: 50px; border-radius: 12px; object-fit: cover;
        }
        .product-info h4 { margin: 0; font-size: 14px; font-weight: 700; }
        .product-info p { margin: 2px 0 0; font-size: 12px; color: var(--gray); }

        .stepper { position: relative; padding-left: 45px; list-style: none; }
        .step { position: relative; margin-bottom: 45px; }
        
        .step::before { 
            content: ''; position: absolute; left: -31px; top: 32px; 
            width: 3px; height: 100%; background: #f1f5f9; 
            transition: 0.5s ease;
        }
        .step:last-child::before { display: none; }
        
        .step-icon { 
            position: absolute; left: -48px; top: 0; 
            width: 36px; height: 36px; border-radius: 50%; 
            background: #f1f5f9; display: flex; align-items: center; 
            justify-content: center; color: #cbd5e1; font-size: 14px; 
            z-index: 2; border: 4px solid white; transition: 0.4s;
        }
        
        .step.active .step-icon { 
            background: var(--accent); color: white;
            box-shadow: 0 0 20px rgba(159, 32, 137, 0.4);
            animation: pulse 1.5s infinite;
        }
        .step.active h4 { color: var(--accent); }

        .step.completed .step-icon { background: var(--success); color: white; }
        .step.completed::before { background: var(--success); }

        .step-content h4 { margin: 0; font-size: 16px; font-weight: 700; transition: 0.3s; }
        .step-content p { margin: 5px 0 0; font-size: 13px; color: var(--gray); line-height: 1.4; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* --- Express Delivery Alert --- */
        .est-delivery {
            margin-top: 20px; padding: 15px; background: #ecfdf5;
            border-radius: 15px; border: 1px solid #a7f3d0;
            display: flex; align-items: center; gap: 10px; color: #065f46;
            font-size: 13px; font-weight: 700;
        }
        .flash-icon { color: #fbbf24; animation: flash 1s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="track-container">
        <button class="back-btn" onclick="history.back()"><i class="fa-solid fa-chevron-left"></i></button>

        <div class="track-card">
            <div class="track-header">
                <h2>Track Order</h2>
                <span class="order-id" id="display-order-id">Loading...</span>
            </div>

            <div class="product-mini-card">
                <img id="p-img" src="https://via.placeholder.com/50" alt="">
                <div class="product-info">
                    <h4 id="p-name">Loading product...</h4>
                    <p id="p-details">Elite Collection</p>
                </div>
            </div>

            <div class="stepper">
                <div class="step" id="step-placed">
                    <div class="step-icon"><i class="fa-solid fa-receipt"></i></div>
                    <div class="step-content">
                        <h4>Order Placed</h4>
                        <p>We have received your order</p>
                    </div>
                </div>

                <div class="step" id="step-packed">
                    <div class="step-icon"><i class="fa-solid fa-box-open"></i></div>
                    <div class="step-content">
                        <h4>Packed & Ready</h4>
                        <p>Item is packed at <span id="wh-name">Warehouse</span></p>
                    </div>
                </div>

                <div class="step" id="step-transit">
                    <div class="step-icon"><i class="fa-solid fa-truck-fast"></i></div>
                    <div class="step-content">
                        <h4>Out for Delivery</h4>
                        <p>Rider is on the way to your doorstep</p>
                    </div>
                </div>

                <div class="step" id="step-delivered">
                    <div class="step-icon"><i class="fa-solid fa-house-circle-check"></i></div>
                    <div class="step-content">
                        <h4>Delivered</h4>
                        <p>Enjoy your Drapii Luxe product!</p>
                    </div>
                </div>
            </div>

            <div class="est-delivery">
                <i class="fa-solid fa-bolt flash-icon"></i>
                <span>Express Delivery: Within 3 Hours</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
            authDomain: "fashora-flipkart.firebaseapp.com",
            projectId: "fashora-flipkart",
            storageBucket: "fashora-flipkart.firebasestorage.app",
            messagingSenderId: "383843603520",
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('id');
        
        if(orderId) {
            document.getElementById('display-order-id').innerText = "ORDER #" + orderId.slice(-8).toUpperCase();

            onSnapshot(doc(db, "orders", orderId), (docSnap) => {
                if(docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('p-name').innerText = data.productName || "Product";
                    document.getElementById('p-img').src = data.productImage || data.image || "https://via.placeholder.com/50";
                    document.getElementById('wh-name').innerText = data.city || "Seller Warehouse";
                    updateStepper(data.status);
                }
            });
        }

        function updateStepper(status) {
            const stepsMap = {
                "Order Placed": 0,
                "Packed": 1,
                "Out for Delivery": 2,
                "Delivered": 3
            };
            const currentIdx = stepsMap[status] ?? 0;
            const stepIds = ["step-placed", "step-packed", "step-transit", "step-delivered"];
            stepIds.forEach((id, index) => {
                const el = document.getElementById(id);
                el.classList.remove('active', 'completed');
                if(index < currentIdx) el.classList.add('completed');
                else if(index === currentIdx) el.classList.add('active');
            });
        }
    </script>
</body>
</html>
