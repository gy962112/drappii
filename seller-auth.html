<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Panel | Drapii Luxe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --pink: #f43397; --bg: #f0f2f5; --dark: #1e293b; --success: #16a34a; --gray: #94a3b8; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background: var(--bg); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        
        #authSection, .container { display: none; }
        #authSection { width: 100%; max-width: 400px; background: #fff; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .auth-tabs { display: flex; background: #f1f5f9; padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .auth-tab { flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight:700; color:#64748b; background:transparent; font-size: 12px; }
        .auth-tab.active { background:#fff; color:var(--pink); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .container { width: 100%; max-width: 500px; padding-bottom: 40px; }
        .wh-profile-card { background: #fff; border-radius: 16px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eee; }
        .wh-banner { width: 100%; height: 160px; object-fit: cover; background: #eee; border-bottom: 3px solid var(--pink); }
        .wh-info { padding: 15px; }

        label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 5px; color: var(--dark); text-transform: uppercase; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 14px; margin-bottom: 10px; background: #fff; transition: 0.3s; }
        input:focus { border-color: var(--pink); }
        
        .size-chips, .color-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; }
        .size-chip { padding: 8px 15px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; background: #fff; }
        .size-chip.selected { background: var(--pink); color: #fff; border-color: var(--pink); }

        .color-circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #eee; cursor: pointer; position: relative; transition: 0.2s; }
        .color-circle.selected { border-color: var(--pink); transform: scale(1.1); box-shadow: 0 0 10px rgba(244, 51, 151, 0.3); }
        .color-circle.selected::after { content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #fff; font-size: 10px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-shadow: 0 0 3px #000; }

        .btn-main { width: 100%; padding: 15px; background: var(--pink); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-main:disabled { background: #cbd5e1; cursor: not-allowed; }

        .upload-area { border: 2px dashed #cbd5e1; padding: 15px; text-align: center; border-radius: 12px; background: #f8fafc; cursor: pointer; margin-bottom: 10px; }
        .upload-area img { max-width: 100%; max-height: 150px; display: none; margin: 10px auto; border-radius: 8px; }
        
        .hidden { display: none; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--dark); color: white; padding: 15px; border-radius: 15px; text-align: center; }
        
        .order-card { background:#fff; border-radius:12px; padding:15px; margin-bottom:15px; border:1px solid #eee; box-shadow:0 2px 5px rgba(0,0,0,0.02); }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--pink); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .product-item { background: #fff; padding: 12px; border-radius: 15px; display: flex; align-items: center; gap: 12px; margin-top: 10px; border: 1px solid #eee; }
        .product-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .product-info { flex: 1; }
        .delete-btn { color: #ef4444; background: #fee2e2; border: none; padding: 8px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top:10px; font-weight:700; color:var(--dark)">Setting up Warehouse...</p>
    </div>

    <div id="authSection">
        <div style="text-align: center; margin-bottom: 20px;">
            <i class="fa-solid fa-warehouse" style="font-size: 40px; color: var(--pink);"></i>
            <h2 style="margin-top:10px">Seller Hub</h2>
        </div>
        <div class="auth-tabs">
            <button class="auth-tab active" id="loginTabBtn" onclick="toggleAuth('login')">Login</button>
            <button class="auth-tab" id="signupTabBtn" onclick="toggleAuth('signup')">Register</button>
        </div>
        <div id="loginFields">
            <input type="email" id="logEmail" placeholder="Email Address">
            <input type="password" id="logPass" placeholder="Password">
            <button class="btn-main" id="loginBtn" onclick="login()">Enter Warehouse</button>
        </div>
        <div id="signupFields" class="hidden">
            <input type="text" id="regName" placeholder="Warehouse Name">
            <label>Warehouse City</label>
            <select id="regCity" onchange="checkNewCity(this.value)">
                <option value="">Select Your City</option>
                <option value="Agra">Agra</option>
                <option value="Delhi">Delhi</option>
                <option value="Mumbai">Mumbai</option>
                <option value="NEW_CITY">+ Add New City</option>
            </select>
            <input type="text" id="newCityInput" class="hidden" placeholder="Enter Your City Name">
            <textarea id="regAddr" placeholder="Full Address with Landmark"></textarea>
            <label>Warehouse Image URL</label>
            <input type="url" id="regWhUrl" placeholder="Paste image link here">
            <input type="email" id="regEmail" placeholder="Email Address">
            <input type="password" id="regPass" placeholder="Create Password">
            <button class="btn-main" id="signupBtn" onclick="signup()">Create Warehouse Account</button>
        </div>
    </div>

    <div class="container" id="dashboardSection">
        <div class="header-bar" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <div>
                <h2 id="welcomeName" style="font-weight:800">Warehouse</h2>
                <span id="displayWhCity" style="font-size:11px; background:var(--pink); color:#fff; padding:2px 8px; border-radius:10px; font-weight:700"></span>
            </div>
            <button class="btn-main" onclick="logout()" style="width:auto; padding:8px 15px; background:#fee2e2; color:#ef4444"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div class="wh-profile-card">
            <img id="displayWhImg" class="wh-banner" src="">
            <div class="wh-info">
                <p id="displayWhAddr" style="font-size: 13px; font-weight: 600; color:#555"></p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><h4>Orders</h4><p id="totalOrdersCount" style="font-size:22px; font-weight:800">0</p></div>
            <div class="stat-box" style="background:var(--pink)"><h4>80% Payout</h4><p id="totalPayoutAmt" style="font-size:22px; font-weight:800">₹0</p></div>
        </div>

        <div class="auth-tabs" style="background:#fff; border:1px solid #eee">
            <button class="auth-tab active" id="addTab" onclick="switchDash('add')">Add Product</button>
            <button class="auth-tab" id="orderTab" onclick="switchDash('orders')">Live Orders</button>
            <button class="auth-tab" id="payTab" onclick="switchDash('pay')">Bank Account</button>
        </div>

        <div id="addProductUI">
            <label>Product Visuals</label>
            <div class="upload-area" onclick="document.getElementById('pImg').click()">
                <i class="fa-solid fa-image"></i> Click to Upload Photo
                <img id="pImgPrev">
            </div>
            <input type="file" id="pImg" hidden onchange="previewImg(this, 'pImgPrev')">
            <textarea id="pImgUrl" placeholder="OR Paste Image URL" style="height: 60px;"></textarea>

            <label>Category Details</label>
            <select id="pCategory" onchange="handleCategoryChange(this.value)">
                <option value="">Select Category</option>
                <option value="Saree">Saree</option>
                <option value="Shirt">Mens Shirt</option>
                <option value="Kurti">Kurti / Ethnic Wear</option>
                <option value="Kids">Kids Wear</option>
                <option value="NEW">+ Add New Category</option>
            </select>
            <input type="text" id="newCatInput" class="hidden" placeholder="Enter New Category Name">

            <label>Basic Details</label>
            <input type="text" id="pName" placeholder="Product Title">
            
            <div id="attributeSection" style="background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 10px;">
                <p style="font-size: 10px; color: var(--gray); text-align: center;">Select a category to add more details</p>
            </div>

            <textarea id="pDesc" placeholder="Full Description"></textarea>

            <label>Select Colors</label>
            <div class="color-chips" id="colorContainer">
                <div class="color-circle" style="background:red" data-color="Red" onclick="toggleColor(this)"></div>
                <div class="color-circle" style="background:black" data-color="Black" onclick="toggleColor(this)"></div>
                <div class="color-circle" style="background:blue" data-color="Blue" onclick="toggleColor(this)"></div>
                <div class="color-circle" style="background:pink" data-color="Pink" onclick="toggleColor(this)"></div>
                <div class="color-circle" style="background:white" data-color="White" onclick="toggleColor(this)"></div>
                <div class="color-circle" style="background:green" data-color="Green" onclick="toggleColor(this)"></div>
            </div>

            <label>Available Sizes</label>
            <div class="size-chips" id="sizeContainer"></div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <div><label>Price (₹)</label><input type="number" id="pPrice" placeholder="Selling Price"></div>
                <div><label>Stock</label><input type="number" id="pStock" placeholder="Total Stock"></div>
            </div>
            <button class="btn-main" id="uploadBtn" onclick="uploadProduct()">Launch Product</button>

            <div style="margin-top: 30px;">
                <h4 style="font-weight: 800; border-bottom: 2px solid var(--pink); display: inline-block;">My Products</h4>
                <div id="sellerProductList" style="margin-top: 10px;"></div>
            </div>
        </div>

        <div id="ordersUI" class="hidden"><div id="ordersList"></div></div>
        <div id="payUI" class="hidden">
             <label>Account Holder Name</label><input type="text" id="accHolder">
             <label>Account Number</label><input type="text" id="accNumber">
             <label>Bank Name</label><input type="text" id="bankName">
             <label>IFSC Code</label><input type="text" id="ifscCode">
             <button class="btn-main" onclick="updateBankDetails()">Save Bank Details</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, getDocs, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q", 
            authDomain: "fashora-flipkart.firebaseapp.com", 
            projectId: "fashora-flipkart", 
            storageBucket: "fashora-flipkart.firebasestorage.app", 
            messagingSenderId: "383843603520", 
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let sellerId = "";
        let sellerCity = ""; 
        let selectedSizes = [];
        let selectedColors = [];

        window.toggleAuth = (m) => {
            document.getElementById('loginFields').classList.toggle('hidden', m==='signup');
            document.getElementById('signupFields').classList.toggle('hidden', m==='login');
            document.getElementById('loginTabBtn').classList.toggle('active', m==='login');
            document.getElementById('signupTabBtn').classList.toggle('active', m==='signup');
        };

        window.switchDash = (tab) => {
            document.getElementById('addProductUI').classList.toggle('hidden', tab !== 'add');
            document.getElementById('ordersUI').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('payUI').classList.toggle('hidden', tab !== 'pay');
            document.getElementById('addTab').classList.toggle('active', tab === 'add');
            document.getElementById('orderTab').classList.toggle('active', tab === 'orders');
            document.getElementById('payTab').classList.toggle('active', tab === 'pay');
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                sellerId = user.uid;
                const sDoc = await getDoc(doc(db, "sellers", sellerId));
                if(sDoc.exists()){
                    const d = sDoc.data();
                    sellerCity = d.warehouseCity;
                    document.getElementById('welcomeName').innerText = d.warehouseName;
                    document.getElementById('displayWhCity').innerText = sellerCity;
                    document.getElementById('displayWhImg').src = d.warehouseImg;
                    document.getElementById('displayWhAddr').innerText = d.address;
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('dashboardSection').style.display = 'block';
                    loadStats();
                    loadSellerProducts();
                }
            }
            document.getElementById('loader').style.display = 'none';
        });

        // --- Live Orders & 80% Payout Tracking Fix ---
        async function loadStats() {
            // Live Snapshot for real-time tracking
            const q = query(collection(db, "orders"), where("sellerId", "==", sellerId));
            onSnapshot(q, (snap) => {
                document.getElementById('totalOrdersCount').innerText = snap.size;
                let totalPayout = 0;
                let html = "";

                snap.forEach(docSnap => {
                    const order = docSnap.data();
                    const orderId = docSnap.id;
                    const price = Number(order.productPrice || order.price || 0);
                    
                    // Calculation: 80% of product price goes to seller
                    totalPayout += (price * 0.8);

                    html += `
                        <div class="order-card">
                            <div style="display:flex; gap:10px">
                                <img src="${order.productImg || order.image}" style="width:50px; height:50px; border-radius:8px">
                                <div style="flex:1">
                                    <h4 style="font-size:14px">${order.productName}</h4>
                                    <p style="font-size:12px; color:gray">Price: ₹${price} | Size: ${order.size}</p>
                                    <p style="font-size:11px; font-weight:700; color:var(--pink)">Status: ${order.status || 'Pending'}</p>
                                </div>
                                <div style="display:flex; flex-direction:column; gap:5px">
                                    <button onclick="updateStatus('${orderId}', 'Shipped')" style="font-size:10px; background:var(--dark); color:white; border:none; padding:5px; border-radius:5px">Ship</button>
                                    <button onclick="updateStatus('${orderId}', 'Delivered')" style="font-size:10px; background:var(--success); color:white; border:none; padding:5px; border-radius:5px">Deliver</button>
                                </div>
                            </div>
                            <div style="margin-top:10px; border-top:1px solid #eee; padding-top:5px; font-size:11px; color:#555">
                                <p>Customer: ${order.userName || 'Drapii User'}</p>
                                <p>Address: ${order.address || 'N/A'}</p>
                            </div>
                        </div>`;
                });

                document.getElementById('totalPayoutAmt').innerText = "₹" + Math.round(totalPayout);
                document.getElementById('ordersList').innerHTML = html || "<p style='text-align:center; color:gray'>No live orders</p>";
            });
        }

        window.updateStatus = async (id, status) => {
            try {
                await updateDoc(doc(db, "orders", id), { status: status });
                alert("Status Updated: " + status);
            } catch (e) { alert("Error updating status"); }
        };

        // --- Category & Attributes Logic ---
        window.handleCategoryChange = (val) => {
            const attrBox = document.getElementById('attributeSection');
            const sizeBox = document.getElementById('sizeContainer');
            document.getElementById('newCatInput').classList.toggle('hidden', val !== 'NEW');
            selectedSizes = [];
            let attrHtml = ""; let sizeHtml = "";

            if(val === 'Saree') {
                attrHtml = `<input type="text" id="f_fabric" placeholder="Fabric">`;
                sizeHtml = `<div class="size-chip selected" onclick="toggleSize(this)">Free Size</div>`;
                selectedSizes = ["Free Size"];
            } else if(val === 'Shirt') {
                attrHtml = `<input type="text" id="f_neck" placeholder="Neck Type">`;
                sizeHtml = ['S','M','L','XL','XXL'].map(s => `<div class="size-chip" onclick="toggleSize(this)">${s}</div>`).join('');
            } else {
                attrHtml = `<p style="font-size:10px; color:gray">Fill standard details</p>`;
                sizeHtml = ['S','M','L','XL','Free Size'].map(s => `<div class="size-chip" onclick="toggleSize(this)">${s}</div>`).join('');
            }
            attrBox.innerHTML = attrHtml;
            sizeBox.innerHTML = sizeHtml;
        };

        window.toggleSize = (el) => {
            el.classList.toggle('selected');
            const size = el.innerText;
            if(selectedSizes.includes(size)) selectedSizes = selectedSizes.filter(s => s !== size);
            else selectedSizes.push(size);
        };

        window.toggleColor = (el) => {
            el.classList.toggle('selected');
            const color = el.getAttribute('data-color');
            if(selectedColors.includes(color)) selectedColors = selectedColors.filter(c => c !== color);
            else selectedColors.push(color);
        };

        // --- Product & Data Functions ---
        window.uploadProduct = async () => {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const cat = document.getElementById('pCategory').value;
            const img = document.getElementById('pImgUrl').value;
            if(!name || !price || !cat || !img) return alert("Fill all details!");

            try {
                await addDoc(collection(db, "products"), {
                    name, price: Number(price), category: cat, image: img,
                    sellerId, warehouseCity: sellerCity, sizes: selectedSizes, colors: selectedColors,
                    timestamp: Date.now()
                });
                alert("Product Launched!"); location.reload();
            } catch (e) { alert(e.message); }
        };

        function loadSellerProducts() {
            const q = query(collection(db, "products"), where("sellerId", "==", sellerId));
            onSnapshot(q, (snap) => {
                let html = "";
                snap.forEach(docSnap => {
                    const p = docSnap.data();
                    html += `<div class="product-item"><img src="${p.image.split(',')[0]}"><div class="product-info"><h5>${p.name}</h5><p>₹${p.price}</p></div><button class="delete-btn" onclick="deleteMyProduct('${docSnap.id}')"><i class="fa-solid fa-trash"></i></button></div>`;
                });
                document.getElementById('sellerProductList').innerHTML = html;
            });
        }

        window.deleteMyProduct = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "db_products", id)); };
        window.login = async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value); } catch(e) { alert("Error"); } };
        window.logout = () => signOut(auth).then(() => location.reload());
    </script>
</body>
</html>
