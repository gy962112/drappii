<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Panel | Drapii Luxe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #f43397; --bg: #f0f2f5; --dark: #1e293b; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); padding: 15px; display: none; } 
        
        .container { max-width: 600px; margin: auto; }
        .panel-card { background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background: #fee2e2; color: #ef4444; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 13px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--dark); color: white; padding: 20px; border-radius: 15px; text-align: center; }
        .stat-box h4 { font-size: 12px; opacity: 0.7; text-transform: uppercase; margin-bottom: 5px; }
        .stat-box p { font-size: 22px; font-weight: 800; }
        .stat-box.highlight { background: var(--pink); }

        .section-title { font-size: 18px; font-weight: 800; margin-bottom: 15px; color: var(--dark); display: flex; align-items: center; gap: 10px; }

        /* Order Card & Live Tracking */
        .order-card { background: #fff; border-radius: 12px; padding: 15px; border-left: 5px solid var(--pink); margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .order-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .order-id { font-weight: 700; font-size: 13px; color: #64748b; }
        .status-select { padding: 5px; font-size: 11px; border-radius: 5px; border: 1px solid #ddd; font-weight: 700; background: #f8fafc; }
        
        .order-item { font-size: 15px; font-weight: 700; margin-bottom: 5px; color: var(--dark); }
        .order-loc { font-size: 13px; color: #64748b; margin-top: 8px; display: flex; align-items: center; gap: 5px; line-height: 1.4; }
        .payout-calc { font-size: 12px; color: #16a34a; background: #f0fdf4; padding: 8px; border-radius: 8px; margin-top: 10px; font-weight: 600; border: 1px dashed #bbf7d0; }

        /* Form Styling */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; font-size: 14px; }
        input:focus { border-color: var(--pink); }
        
        .size-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 5px; }
        .size-box { display: flex; align-items: center; gap: 5px; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; border: 1px solid #e2e8f0; }

        .upload-area { border: 2px dashed #cbd5e1; padding: 20px; text-align: center; border-radius: 10px; background: #f8fafc; cursor: pointer; }
        #imagePreview { width: 100%; max-height: 150px; object-fit: contain; margin-top: 10px; display: none; border-radius: 8px; }

        .divider { text-align: center; margin: 15px 0; color: #94a3b8; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .btn-submit { width: 100%; padding: 15px; background: var(--pink); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-submit:active { transform: scale(0.98); }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; background: #e2e8f0; color: #64748b; }
        .tab-btn.active { background: var(--pink); color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-bar">
            <h2 style="font-weight: 800; color: var(--dark);">Drapii Warehouse</h2>
            <button class="logout-btn" id="logoutBtn"><i class="fa-solid fa-power-off"></i> Logout</button>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <h4>Total Orders</h4>
                <p id="totalOrdersCount">0</p>
            </div>
            <div class="stat-box highlight">
                <h4>Total Payout</h4>
                <p id="totalPayoutAmt">₹0</p>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('add')">Add Product</button>
            <button class="tab-btn" onclick="switchTab('orders')">My Orders</button>
        </div>

        <div id="addProductSection">
            <div class="panel-card">
                <div class="section-title"><i class="fa-solid fa-plus-circle"></i> New Inventory</div>
                <form id="productForm">
                    <div class="form-group">
                        <label>UPI ID (For your Payouts)</label>
                        <input type="text" id="sellerUPI" placeholder="e.g., seller@upi" required>
                    </div>

                    <div class="form-group">
                        <label>Product Image</label>
                        <div class="upload-area" onclick="document.getElementById('imgInput').click()">
                            <div id="uploadPlaceholder"><i class="fa-solid fa-image"></i> Upload from Device</div>
                            <img id="imagePreview">
                        </div>
                        <input type="file" id="imgInput" accept="image/*" hidden>
                        
                        <div class="divider">OR</div>
                        
                        <input type="text" id="pImageUrl" placeholder="Paste Image URL here...">
                    </div>

                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="pName" placeholder="Elite Designer Collection" required>
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Selling Price (₹)</label>
                            <input type="number" id="pPrice" placeholder="999" required>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Category</label>
                            <select id="pCategory">
                                <option value="Kurtis">Kurtis</option>
                                <option value="Sarees">Sarees</option>
                                <option value="Western">Western</option>
                                <option value="Men">Men</option>
                                <option value="Jewellery">Jewellery</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Available Sizes</label>
                        <div class="size-row">
                            <label class="size-box"><input type="checkbox" name="pSize" value="S"> S</label>
                            <label class="size-box"><input type="checkbox" name="pSize" value="M"> M</label>
                            <label class="size-box"><input type="checkbox" name="pSize" value="L"> L</label>
                            <label class="size-box"><input type="checkbox" name="pSize" value="XL"> XL</label>
                            <label class="size-box"><input type="checkbox" name="pSize" value="Free Size"> Free</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Warehouse City</label>
                        <input type="text" id="pCity" placeholder="Lucknow" required>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">Launch Product</button>
                </form>
            </div>
        </div>

        <div id="ordersSection" style="display: none;">
            <div class="section-title"><i class="fa-solid fa-truck-fast"></i> Live Order Tracking</div>
            <div id="ordersList">
                <p style="text-align: center; color: #888; margin-top: 20px;">Fetching orders...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, updateDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q", 
            authDomain: "fashora-flipkart.firebaseapp.com", 
            projectId: "fashora-flipkart", 
            storageBucket: "fashora-flipkart.firebasestorage.app", 
            messagingSenderId: "383843603520", 
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        let currentUid = "";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.body.style.display = "block";
                currentUid = user.uid;
                loadDashboardData();
            } else {
                window.location.href = "seller-auth.html";
            }
        });

        window.switchTab = (tab) => {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.classList.remove('active'));
            if(tab === 'add') {
                document.getElementById('addProductSection').style.display = 'block';
                document.getElementById('ordersSection').style.display = 'none';
                btns[0].classList.add('active');
            } else {
                document.getElementById('addProductSection').style.display = 'none';
                document.getElementById('ordersSection').style.display = 'block';
                btns[1].classList.add('active');
                loadOrders();
            }
        };

        async function loadDashboardData() {
            const q = query(collection(db, "orders"), where("sellerUid", "==", currentUid));
            const snap = await getDocs(q);
            document.getElementById('totalOrdersCount').innerText = snap.size;
            
            let totalPayout = 0;
            snap.forEach(d => {
                const p = Number(d.data().price);
                totalPayout += (p * 0.80);
            });
            document.getElementById('totalPayoutAmt').innerText = "₹" + totalPayout.toFixed(0);
        }

        async function loadOrders() {
            const list = document.getElementById('ordersList');
            list.innerHTML = '<p style="text-align:center">Loading...</p>';
            
            const q = query(collection(db, "orders"), where("sellerUid", "==", currentUid));
            const snap = await getDocs(q);
            
            if(snap.empty) {
                list.innerHTML = '<p style="text-align:center; color:#888; margin-top:20px;">No orders yet.</p>';
                return;
            }

            list.innerHTML = "";
            snap.forEach(d => {
                const order = d.data();
                const total = Number(order.price);
                const payout = total * 0.80;

                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                    <div class="order-header">
                        <span class="order-id">ORDER #${d.id.slice(-6).toUpperCase()}</span>
                        <select class="status-select" onchange="updateStatus('${d.id}', this.value)">
                            <option value="Order Placed" ${order.status=='Order Placed'?'selected':''}>Order Placed</option>
                            <option value="Packed" ${order.status=='Packed'?'selected':''}>Packed</option>
                            <option value="Out for Delivery" ${order.status=='Out for Delivery'?'selected':''}>Out for Delivery</option>
                            <option value="Delivered" ${order.status=='Delivered'?'selected':''}>Delivered</option>
                        </select>
                    </div>
                    <div class="order-item">${order.productName} (Size: ${order.size || 'N/A'})</div>
                    <div class="order-loc">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>${order.customerName}<br>${order.address}, ${order.pincode}</span>
                    </div>
                    <div class="payout-calc">
                        Selling: ₹${total} | Commission (20%): -₹${(total*0.2).toFixed(0)} | <b>Payout: ₹${payout.toFixed(0)}</b>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        window.updateStatus = async (orderId, newStatus) => {
            try {
                const orderRef = doc(db, "orders", orderId);
                await updateDoc(orderRef, { status: newStatus });
                alert("Status Updated to: " + newStatus);
            } catch (e) { alert(e.message); }
        };

        document.getElementById('imgInput').onchange = e => {
            const file = e.target.files[0];
            if(file){
                document.getElementById('imagePreview').src = URL.createObjectURL(file);
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('uploadPlaceholder').style.display = 'none';
                document.getElementById('pImageUrl').value = "";
            }
        };

        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const file = document.getElementById('imgInput').files[0];
            const manualUrl = document.getElementById('pImageUrl').value;
            
            if(!file && !manualUrl) return alert("Please provide an image!");

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                let imgUrl = manualUrl;
                if(file) {
                    const storageRef = ref(storage, `products/${Date.now()}`);
                    const uploadSnap = await uploadBytes(storageRef, file);
                    imgUrl = await getDownloadURL(uploadSnap.ref);
                }

                const selectedSizes = Array.from(document.querySelectorAll('input[name="pSize"]:checked')).map(cb => cb.value);

                await addDoc(collection(db, "products"), {
                    name: document.getElementById('pName').value,
                    price: Number(document.getElementById('pPrice').value),
                    category: document.getElementById('pCategory').value,
                    sizes: selectedSizes,
                    image: imgUrl,
                    city: document.getElementById('pCity').value,
                    sellerUid: currentUid,
                    sellerUPI: document.getElementById('sellerUPI').value,
                    createdAt: new Date().toISOString()
                });

                alert("Success! Product is live.");
                location.reload();
            } catch (err) { alert(err.message); btn.disabled = false; }
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
