<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Panel | Drapii Luxe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --pink: #f43397; --bg: #f0f2f5; --dark: #1e293b; --success: #16a34a; --gray: #94a3b8; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { background: var(--bg); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        
        /* Default state: Dono sections hidden rahenge jab tak auth confirm na ho jaye */
        #authSection, .container { display: none; }

        #authSection { width: 100%; max-width: 400px; background: #fff; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .auth-tabs { display: flex; background: #f1f5f9; padding: 5px; border-radius: 12px; margin-bottom: 20px; }
        .auth-tab { flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight:700; color:#64748b; background:transparent; font-size: 12px; }
        .auth-tab.active { background:#fff; color:var(--pink); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .container { width: 100%; max-width: 500px; }
        .wh-profile-card { background: #fff; border-radius: 16px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eee; }
        .wh-banner { width: 100%; height: 160px; object-fit: cover; background: #f1f5f9; border-bottom: 3px solid var(--pink); }
        .wh-info { padding: 15px; }

        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 5px; color: var(--dark); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 14px; }
        
        .size-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .size-box { display: flex; align-items: center; gap: 5px; background: #f1f5f9; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; border: 1px solid #e2e8f0; cursor: pointer; }

        .btn-main { width: 100%; padding: 15px; background: var(--pink); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .btn-main:disabled { background: #ccc; cursor: wait; }

        .order-card { background: #fff; border-radius: 16px; padding: 18px; margin-bottom: 15px; border: 1px solid #eee; }
        .track-bar { height: 8px; background: #e2e8f0; border-radius: 10px; position: relative; margin: 15px 0 8px 0; overflow: hidden; }
        .track-progress { height: 100%; background: var(--success); transition: 0.5s; width: 0%; }
        .track-steps { display: flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: var(--gray); margin-bottom: 15px; }
        
        .status-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .s-btn { padding: 10px 5px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 9px; font-weight: 800; cursor: pointer; background: #fff; }
        .s-btn.active { background: var(--success); color: white; border-color: var(--success); }

        .upload-area { border: 2px dashed #cbd5e1; padding: 15px; text-align: center; border-radius: 12px; background: #f8fafc; cursor: pointer; }
        .upload-area img { max-width: 100%; max-height: 120px; display: none; margin: 10px auto; border-radius: 8px; }
        .hidden { display: none; }
        .logout-btn { background: #fee2e2; color: #ef4444; border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--dark); color: white; padding: 15px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>

    <div id="authSection">
        <div style="text-align: center; margin-bottom: 20px;">
            <i class="fa-solid fa-warehouse" style="font-size: 40px; color: var(--pink);"></i>
            <h2 style="margin-top:10px">Seller Hub</h2>
        </div>
        <div class="auth-tabs">
            <button class="auth-tab active" id="loginTabBtn" onclick="toggleAuth('login')">Login</button>
            <button class="auth-tab" id="signupTabBtn" onclick="toggleAuth('signup')">Register</button>
        </div>
        <div id="loginFields">
            <input type="email" id="logEmail" placeholder="Email Address">
            <input type="password" id="logPass" placeholder="Password" style="margin:10px 0 20px 0">
            <button class="btn-main" id="loginBtn" onclick="login()">Enter Warehouse</button>
        </div>
        <div id="signupFields" class="hidden">
            <input type="text" id="regName" placeholder="Warehouse Name">
            <textarea id="regAddr" placeholder="Full Address with Landmark" style="margin:10px 0; height: 60px;"></textarea>
            <label>Warehouse Photo</label>
            <div class="upload-area" onclick="document.getElementById('whPhoto').click()">
                <i class="fa-solid fa-camera"></i> Click to Upload Photo
                <img id="whPhotoPrev">
            </div>
            <input type="file" id="whPhoto" hidden accept="image/*" onchange="previewImg(this, 'whPhotoPrev')">
            <input type="email" id="regEmail" placeholder="Email Address" style="margin:10px 0">
            <input type="password" id="regPass" placeholder="Create Password" style="margin-bottom:20px">
            <button class="btn-main" id="signupBtn" onclick="signup()">Create Warehouse</button>
        </div>
    </div>

    <div class="container" id="dashboardSection">
        <div class="header-bar" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h2 id="welcomeName" style="font-weight:800">Warehouse</h2>
            <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div class="wh-profile-card">
            <img id="displayWhImg" class="wh-banner" src="">
            <div class="wh-info">
                <p id="displayWhAddr" style="font-size: 13px; font-weight: 600; color:#555"></p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box"><h4>Orders</h4><p id="totalOrdersCount" style="font-size:22px; font-weight:800">0</p></div>
            <div class="stat-box" style="background:var(--pink)"><h4>Payout</h4><p id="totalPayoutAmt" style="font-size:22px; font-weight:800">₹0</p></div>
        </div>

        <div class="auth-tabs" style="background:#fff; border:1px solid #eee">
            <button class="auth-tab active" id="addTab" onclick="switchDash('add')">Add Product</button>
            <button class="auth-tab" id="orderTab" onclick="switchDash('orders')">Live Orders</button>
            <button class="auth-tab" id="payTab" onclick="switchDash('payout')">Payment QR</button>
        </div>

        <div id="addProductUI">
            <div class="form-group">
                <label>Product Image</label>
                <div class="upload-area" onclick="document.getElementById('pImg').click()">
                    <i class="fa-solid fa-image"></i> Upload Product Image
                    <img id="pImgPrev">
                </div>
                <input type="file" id="pImg" hidden onchange="previewImg(this, 'pImgPrev')">
            </div>
            <input type="text" id="pName" placeholder="Product Name" style="margin-bottom:10px">
            <textarea id="pDesc" placeholder="Product Description (Fabric, Work etc)" style="margin-bottom:10px"></textarea>
            <div class="form-group">
                <label>Sizes</label>
                <div class="size-container">
                    <label class="size-box"><input type="checkbox" name="pSize" value="S"> S</label>
                    <label class="size-box"><input type="checkbox" name="pSize" value="M"> M</label>
                    <label class="size-box"><input type="checkbox" name="pSize" value="L"> L</label>
                    <label class="size-box"><input type="checkbox" name="pSize" value="XL"> XL</label>
                    <label class="size-box"><input type="checkbox" name="pSize" value="Free"> Free</label>
                </div>
            </div>
            <div style="display:flex; gap:10px">
                <input type="number" id="pPrice" placeholder="Price (₹)" style="flex:1">
                <select id="pCat" style="flex:1"><option>Kurtis</option><option>Sarees</option><option>Western</option></select>
            </div>
            <button class="btn-main" id="uploadBtn" onclick="uploadProduct()" style="margin-top:15px">Launch Product</button>
        </div>

        <div id="ordersUI" class="hidden">
            <div id="ordersList"></div>
        </div>

        <div id="payoutUI" class="hidden">
            <div class="upload-area" onclick="document.getElementById('qrFile').click()">
                <i class="fa-solid fa-qrcode"></i> Upload Payment QR
                <img id="qrPrev">
            </div>
            <input type="file" id="qrFile" hidden onchange="previewImg(this, 'qrPrev')">
            <button class="btn-main" style="margin-top:10px" onclick="saveQR()">Update QR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, getDocs, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q", 
            authDomain: "fashora-flipkart.firebaseapp.com", 
            projectId: "fashora-flipkart", 
            storageBucket: "fashora-flipkart.firebasestorage.app", 
            messagingSenderId: "383843603520", 
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let sellerId = "";

        // UI Helpers
        window.toggleAuth = (m) => {
            document.getElementById('loginFields').classList.toggle('hidden', m==='signup');
            document.getElementById('signupFields').classList.toggle('hidden', m==='login');
            document.getElementById('loginTabBtn').classList.toggle('active', m==='login');
            document.getElementById('signupTabBtn').classList.toggle('active', m==='signup');
        };

        window.switchDash = (tab) => {
            ['addProductUI', 'ordersUI', 'payoutUI'].forEach(id => document.getElementById(id).classList.add('hidden'));
            ['addTab', 'orderTab', 'payTab'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(tab + 'UI').classList.remove('hidden');
            document.getElementById(tab + 'Tab').classList.add('active');
        };

        window.previewImg = (input, targetId) => {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.getElementById(targetId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };

        // --- Auth Logic ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                sellerId = user.uid;
                const sDoc = await getDoc(doc(db, "sellers", sellerId));
                
                // Sabse important check: Agar Firestore mein data hai tabhi Dashboard dikhana
                if(sDoc.exists()){
                    const d = sDoc.data();
                    document.getElementById('authSection').style.display = 'none';
                    document.getElementById('dashboardSection').style.display = 'block';
                    document.getElementById('welcomeName').innerText = d.warehouseName;
                    document.getElementById('displayWhImg').src = d.warehouseImg;
                    document.getElementById('displayWhAddr').innerText = d.address;
                    loadStats();
                    listenOrders();
                } else {
                    // Auth hai par data nahi (Incomplete Signup) -> Register form dikhao
                    document.getElementById('authSection').style.display = 'block';
                    document.getElementById('dashboardSection').style.display = 'none';
                    toggleAuth('signup');
                }
            } else {
                // No Auth -> Login form dikhao
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('dashboardSection').style.display = 'none';
                toggleAuth('login');
            }
        });

        window.signup = async () => {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const whFile = document.getElementById('whPhoto').files[0];
            const name = document.getElementById('regName').value;
            const addr = document.getElementById('regAddr').value;

            if(!whFile || !name || !addr) return alert("Please fill all details and upload Warehouse photo");

            const btn = document.getElementById('signupBtn');
            btn.disabled = true; btn.innerText = "Creating Account...";

            try {
                const res = await createUserWithEmailAndPassword(auth, email, pass);
                const sRef = ref(storage, `warehouses/${res.user.uid}`);
                await uploadBytes(sRef, whFile);
                const url = await getDownloadURL(sRef);
                
                await setDoc(doc(db, "sellers", res.user.uid), {
                    warehouseName: name,
                    address: addr,
                    warehouseImg: url,
                    email: email,
                    sellerUid: res.user.uid
                });
                // Success ke baad automatic onAuthStateChanged dashboard khol dega
            } catch (e) { alert(e.message); btn.disabled = false; btn.innerText = "Create Warehouse"; }
        };

        window.login = async () => {
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.innerText = "Verifying...";
            try { 
                await signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value); 
            } catch (e) { alert("Invalid login details!"); btn.disabled = false; btn.innerText = "Enter Warehouse"; }
        };

        window.logout = () => signOut(auth).then(() => location.reload());

        // --- Dashboard Logic ---
        function listenOrders() {
            const q = query(collection(db, "orders"), where("sellerUid", "==", sellerId));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('ordersList');
                list.innerHTML = snap.empty ? "<p style='text-align:center; padding:20px; color:#999'>No orders found.</p>" : "";
                snap.forEach(d => {
                    const o = d.data();
                    const status = o.status || "Pending";
                    let perc = status === "Packed" ? "35%" : status === "Dispatched" ? "70%" : status === "Delivered" ? "100%" : "5%";
                    
                    const div = document.createElement('div');
                    div.className = 'order-card';
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; font-size:11px">
                            <b>ORD-${d.id.slice(-5).toUpperCase()}</b>
                            <span style="color:var(--pink); font-weight:800">${status}</span>
                        </div>
                        <p style="margin:5px 0; font-weight:700">${o.productName}</p>
                        <div class="track-bar"><div class="track-progress" style="width:${perc}"></div></div>
                        <div class="track-steps"><span>PACKED</span><span>WITH BOY</span><span>DELIVERED</span></div>
                        <div class="status-btns">
                            <button class="s-btn ${status==='Packed'?'active':''}" onclick="updateStatus('${d.id}','Packed')">PACKED</button>
                            <button class="s-btn ${status==='Dispatched'?'active':''}" onclick="updateStatus('${d.id}','Dispatched')">WITH BOY</button>
                            <button class="s-btn ${status==='Delivered'?'active':''}" onclick="updateStatus('${d.id}','Delivered')">DELIVERED</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }

        window.updateStatus = async (id, s) => {
            await updateDoc(doc(db, "orders", id), { status: s });
        };

        window.uploadProduct = async () => {
            const f = document.getElementById('pImg').files[0];
            const sz = Array.from(document.querySelectorAll('input[name="pSize"]:checked')).map(e => e.value);
            if(!f || sz.length === 0) return alert("Select photo & sizes");
            
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true; btn.innerText = "Uploading...";

            const sRef = ref(storage, `products/${Date.now()}`);
            await uploadBytes(sRef, f);
            const url = await getDownloadURL(sRef);
            
            await addDoc(collection(db, "products"), {
                name: document.getElementById('pName').value,
                description: document.getElementById('pDesc').value,
                price: Number(document.getElementById('pPrice').value),
                sizes: sz,
                image: url,
                category: document.getElementById('pCat').value,
                sellerUid: sellerId,
                status: 'active'
            });
            alert("Product Live!");
            location.reload();
        };

        window.saveQR = async () => {
            const f = document.getElementById('qrFile').files[0];
            if(!f) return alert("Select QR Photo");
            const sRef = ref(storage, `qrs/${sellerId}`);
            await uploadBytes(sRef, f);
            const url = await getDownloadURL(sRef);
            await updateDoc(doc(db, "sellers", sellerId), { payoutQR: url });
            alert("QR Updated");
        };

        async function loadStats() {
            const q = query(collection(db, "orders"), where("sellerUid", "==", sellerId));
            const snap = await getDocs(q);
            document.getElementById('totalOrdersCount').innerText = snap.size;
            let t = 0;
            snap.forEach(d => t += (Number(d.data().price || 0) * 0.8));
            document.getElementById('totalPayoutAmt').innerText = "₹" + t.toFixed(0);
        }
    </script>
</body>
</html>
