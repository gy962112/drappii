<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Panel | Drapii</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --pink: #f43397; --bg: #f0f2f5; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { background: var(--bg); padding: 20px; }
        .panel-card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 600px; margin: auto; }
        h2 { color: var(--pink); margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 5px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .upload-area { border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 10px; cursor: pointer; background: #fafafa; }
        #imagePreview { width: 100%; max-height: 200px; object-fit: contain; display: none; margin-top: 10px; border-radius: 8px; }
        .btn-submit { width: 100%; padding: 15px; background: var(--pink); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-submit:disabled { background: #ccc; }
        .status-msg { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 600; padding: 10px; border-radius: 6px; display: none; }
    </style>
</head>
<body>

    <div class="panel-card">
        <h2><i class="fa-solid fa-warehouse"></i> Warehouse Panel</h2>
        
        <form id="productForm">
            <div class="form-group">
                <label>Option 1: Upload Photo</label>
                <div class="upload-area" onclick="document.getElementById('imgInput').click()">
                    <i class="fa-solid fa-cloud-arrow-up" style="font-size: 30px; color: #aaa;"></i>
                    <p id="uploadText">Click to Upload</p>
                    <img id="imagePreview">
                </div>
                <input type="file" id="imgInput" accept="image/*" hidden>
            </div>

            <div class="form-group">
                <label>Option 2: Image URL (Paste Link Here)</label>
                <input type="text" id="pImageUrl" placeholder="https://example.com/image.jpg">
            </div>

            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="pName" placeholder="e.g. Designer Kurta" required>
            </div>

            <div class="form-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Price (₹)</label>
                    <input type="number" id="pPrice" placeholder="999" required>
                </div>
                <div style="flex: 1;">
                    <label>Category</label>
                    <select id="pCategory">
                        <option value="Kurtis">Kurtis</option>
                        <option value="Sarees">Sarees</option>
                        <option value="Jewellery">Jewellery</option>
                        <option value="Men">Men</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Warehouse City</label>
                <input type="text" id="pCity" placeholder="Lucknow, Delhi etc." required>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Add Product</button>
            <div class="status-msg" id="statusMsg"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q", 
            authDomain: "fashora-flipkart.firebaseapp.com", 
            projectId: "fashora-flipkart", 
            storageBucket: "fashora-flipkart.firebasestorage.app", 
            messagingSenderId: "383843603520", 
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const imgInput = document.getElementById('imgInput');
        const imagePreview = document.getElementById('imagePreview');

        imgInput.onchange = e => {
            const file = imgInput.files[0];
            if (file) {
                imagePreview.src = URL.createObjectURL(file);
                imagePreview.style.display = 'block';
                document.getElementById('uploadText').style.display = 'none';
            }
        };

        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('statusMsg');
            
            btn.disabled = true;
            btn.innerText = "⏳ Adding Product...";
            msg.style.display = "block";
            msg.innerText = "Processing...";

            try {
                let finalImageUrl = document.getElementById('pImageUrl').value;
                const file = imgInput.files[0];

                // Agar file select ki hai toh upload karein
                if (file) {
                    const storageRef = ref(storage, `products/${Date.now()}_${file.name}`);
                    const snapshot = await uploadBytes(storageRef, file);
                    finalImageUrl = await getDownloadURL(snapshot.ref);
                }

                if (!finalImageUrl) throw new Error("Please upload a photo OR paste an Image URL");

                await addDoc(collection(db, "products"), {
                    name: document.getElementById('pName').value,
                    price: Number(document.getElementById('pPrice').value),
                    category: document.getElementById('pCategory').value,
                    city: document.getElementById('pCity').value,
                    image: finalImageUrl,
                    createdAt: new Date().toISOString()
                });

                msg.style.background = "#e8f5e9";
                msg.style.color = "green";
                msg.innerText = "✅ Success! Product added to shop.";
                document.getElementById('productForm').reset();
                imagePreview.style.display = 'none';

            } catch (error) {
                console.error(error);
                msg.style.background = "#ffebee";
                msg.style.color = "red";
                msg.innerText = "❌ Error: " + error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = "Add Product";
            }
        };
    </script>
</body>
</html>
