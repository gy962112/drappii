<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drapii | Login</title>
    <style>
        :root {
            --primary: #f43397;
            --primary-light: #fcdbe9;
            --text-dark: #333333;
            --text-grey: #666666;
            --border: #dddddd;
            --bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            padding: 24px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        .brand-header {
            text-align: center;
            margin: 40px 0 32px;
        }

        .brand-logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -1px;
            margin-bottom: 4px;
        }

        .brand-sub {
            font-size: 14px;
            color: var(--text-grey);
            font-weight: 500;
        }

        .view {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .view.active {
            display: block;
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .info-txt {
            font-size: 14px;
            color: var(--text-grey);
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-grey);
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
        }

        .phone-input-box {
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding: 8px 0;
            transition: border-color 0.2s;
        }

        .phone-input-box:focus-within {
            border-color: var(--primary);
        }

        .cc {
            font-size: 18px;
            font-weight: 600;
            margin-right: 12px;
            color: var(--text-dark);
        }

        input[type="tel"] {
            border: none;
            outline: none;
            font-size: 18px;
            width: 100%;
            font-weight: 500;
            background: transparent;
        }

        .otp-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 24px 0;
        }

        .otp-input {
            width: 45px;
            height: 52px;
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            outline: none;
            transition: all 0.2s;
        }

        .otp-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .btn-cta {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-cta:disabled {
            background-color: var(--primary-light);
            cursor: not-allowed;
        }

        .timer-row {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-grey);
        }

        .resend-link {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        #msg-toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #323232;
            color: #fff;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 14px;
            display: none;
            z-index: 9999;
            width: max-content;
        }
    </style>
</head>
<body>

    <div id="msg-toast"></div>

    <div class="container">
        <div class="brand-header">
            <div class="brand-logo">Drapii</div>
            <div class="brand-sub">3-Hour Local Delivery</div>
        </div>

        <div id="phone-view" class="view active">
            <h2>Login</h2>
            <p class="info-txt">Enter your mobile number to get started</p>
            <div class="input-group">
                <span class="label">Mobile Number</span>
                <div class="phone-input-box">
                    <span class="cc">+91</span>
                    <input type="tel" id="mobile-number" placeholder="00000 00000" maxlength="10" inputmode="numeric">
                </div>
            </div>
            <div id="recaptcha-container"></div>
            <button id="btn-send-otp" class="btn-cta" disabled>
                <span class="btn-text">Send OTP</span>
                <div class="spinner"></div>
            </button>
            <p style="text-align:center; font-size:13px; margin-top:20px; color:var(--text-grey)">
                New to Drapii? <a href="signup.html" style="color:var(--primary); font-weight:600; text-decoration:none">Sign Up</a>
            </p>
        </div>

        <div id="otp-view" class="view">
            <h2>Verify OTP</h2>
            <p class="info-txt">Enter 6-digit code sent to +91 <span id="target-phone"></span></p>
            <div class="otp-container">
                <input type="tel" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="tel" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="tel" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="tel" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="tel" class="otp-input" maxlength="1" inputmode="numeric">
                <input type="tel" class="otp-input" maxlength="1" inputmode="numeric">
            </div>
            <button id="btn-verify-otp" class="btn-cta">
                <span class="btn-text">Verify & Login</span>
                <div class="spinner"></div>
            </button>
            <div class="timer-row">
                <span id="timer-box">Resend OTP in <span id="timer-sec">30</span>s</span>
                <span id="btn-resend" class="resend-link" style="display:none">Resend OTP</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q",
            authDomain: "fashora-flipkart.firebaseapp.com",
            projectId: "fashora-flipkart",
            storageBucket: "fashora-flipkart.firebasestorage.app",
            messagingSenderId: "383843603520",
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let confirmResult = null;
        let countdown = null;

        const phoneInput = document.getElementById('mobile-number');
        const sendBtn = document.getElementById('btn-send-otp');
        const otpInputs = document.querySelectorAll('.otp-input');
        const verifyBtn = document.getElementById('btn-verify-otp');
        const toast = document.getElementById('msg-toast');

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function setBtnLoading(btn, isLoading) {
            const txt = btn.querySelector('.btn-text');
            const spin = btn.querySelector('.spinner');
            btn.disabled = isLoading;
            txt.style.display = isLoading ? 'none' : 'block';
            spin.style.display = isLoading ? 'block' : 'none';
        }

        // Redirect logic for logged in users
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (userSnap.exists()) {
                    window.location.href = "index.html";
                } else {
                    // Authenticated but no profile? Send to signup to finish.
                    window.location.href = "signup.html";
                }
            }
        });

        phoneInput.addEventListener('input', (e) => {
            const clean = e.target.value.replace(/\D/g, '');
            e.target.value = clean;
            sendBtn.disabled = clean.length !== 10;
        });

        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });

        sendBtn.onclick = async () => {
            const fullPhone = "+91" + phoneInput.value;
            setBtnLoading(sendBtn, true);
            try {
                confirmResult = await signInWithPhoneNumber(auth, fullPhone, window.recaptchaVerifier);
                document.getElementById('target-phone').innerText = phoneInput.value;
                document.getElementById('phone-view').classList.remove('active');
                document.getElementById('otp-view').classList.add('active');
                startResendTimer();
                otpInputs[0].focus();
            } catch (err) {
                showToast("Request failed. Try again.");
                if (window.grecaptcha) window.grecaptcha.reset();
            } finally {
                setBtnLoading(sendBtn, false);
            }
        };

        otpInputs.forEach((input, idx) => {
            input.oninput = (e) => {
                if (e.target.value && idx < 5) otpInputs[idx + 1].focus();
            };
            input.onkeydown = (e) => {
                if (e.key === "Backspace" && !e.target.value && idx > 0) otpInputs[idx - 1].focus();
            };
        });

        verifyBtn.onclick = async () => {
            const otpCode = Array.from(otpInputs).map(i => i.value).join('');
            if (otpCode.length < 6) return showToast("Enter full OTP code");

            setBtnLoading(verifyBtn, true);
            try {
                const result = await confirmResult.confirm(otpCode);
                const userSnap = await getDoc(doc(db, "users", result.user.uid));
                if (userSnap.exists()) {
                    window.location.href = "index.html";
                } else {
                    showToast("Account not found. Please sign up.");
                    setTimeout(() => window.location.href = "signup.html", 2000);
                }
            } catch (err) {
                showToast("Invalid OTP code.");
                otpInputs.forEach(i => i.value = "");
                otpInputs[0].focus();
            } finally {
                setBtnLoading(verifyBtn, false);
            }
        };

        function startResendTimer() {
            let sec = 30;
            const timerBox = document.getElementById('timer-box');
            const resendBtn = document.getElementById('btn-resend');
            const secTxt = document.getElementById('timer-sec');
            timerBox.style.display = 'inline';
            resendBtn.style.display = 'none';
            if(countdown) clearInterval(countdown);
            countdown = setInterval(() => {
                sec--;
                secTxt.innerText = sec;
                if (sec <= 0) {
                    clearInterval(countdown);
                    timerBox.style.display = 'none';
                    resendBtn.style.display = 'inline';
                }
            }, 1000);
        }

        document.getElementById('btn-resend').onclick = () => sendBtn.click();
    </script>
</body>
</html>
