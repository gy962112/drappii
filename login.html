<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Drapii Luxe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --accent: #9f2089;
            --accent-gradient: linear-gradient(135deg, #9f2089 0%, #ff5e9e 100%);
            --text-main: #1a1a1a;
            --text-muted: #757575;
            --white: #ffffff;
            --bg-soft: #fcfcfc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-soft); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* Luxury Hero Banner (Same as Signup) */
        .banner-container {
            width: 100%;
            height: 320px;
            background: url('https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .banner-container::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), var(--bg-soft));
        }

        /* Float Card */
        .auth-card {
            background: var(--white);
            width: 92%;
            max-width: 420px;
            margin: -90px 20px 40px;
            border-radius: 35px;
            padding: 50px 30px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.1);
            position: relative; z-index: 100;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.8);
        }

        .logo-txt {
            font-size: 42px; font-weight: 800;
            background: var(--accent-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; letter-spacing: -2px; margin-bottom: 12px;
        }

        .sub-txt { font-size: 15px; color: var(--text-muted); margin-bottom: 45px; font-weight: 500; }

        /* Modern Inputs */
        .input-group {
            background: #f5f5f7; border-radius: 20px;
            padding: 18px 24px; display: flex; align-items: center; margin-bottom: 25px;
            border: 1.5px solid transparent; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-group:focus-within { border-color: var(--accent); background: #fff; box-shadow: 0 10px 25px rgba(159, 32, 137, 0.08); }
        .input-group span { font-weight: 800; margin-right: 12px; color: var(--text-main); font-size: 17px; }
        .input-group input { border: none; outline: none; font-size: 17px; width: 100%; font-weight: 600; background: transparent; color: var(--text-main); }

        .btn-main {
            width: 100%; background: var(--text-main); color: white;
            border: none; padding: 20px; border-radius: 20px;
            font-size: 17px; font-weight: 800; cursor: pointer;
            transition: 0.4s; letter-spacing: 0.5px;
        }
        .btn-main:active { transform: scale(0.96); }
        .btn-main:disabled { background: #e0e0e2; color: #a0a0a5; cursor: not-allowed; }

        /* Step Animations */
        .view { display: none; }
        .view.active { display: block; animation: luxeUp 0.7s cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes luxeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        /* OTP Grid */
        .otp-inputs { display: flex; justify-content: space-between; margin: 35px 0; gap: 10px; }
        .otp-field { width: 100%; height: 60px; background: #f5f5f7; border: 1.5px solid transparent; border-radius: 16px; text-align: center; font-size: 26px; font-weight: 800; color: var(--accent); transition: 0.3s; }
        .otp-field:focus { border-color: var(--accent); background: #fff; outline: none; }

        .resend-box { margin-bottom: 35px; font-size: 14px; font-weight: 700; color: var(--text-muted); }
        .resend-link { color: var(--accent); cursor: pointer; text-decoration: underline; margin-left: 5px; }

        .footer-link { margin-top: 30px; font-size: 14px; color: var(--text-muted); font-weight: 600; }
        .footer-link a { color: var(--accent); text-decoration: none; font-weight: 800; }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(26,26,26,0.95); backdrop-filter: blur(10px); color: #fff; 
            padding: 14px 28px; border-radius: 35px; font-size: 14px; font-weight: 600; 
            display: none; z-index: 1000; box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="banner-container"></div>

<div class="auth-card">
    <div class="logo-txt">Drapii</div>
    <div class="sub-txt">Experience Elite Fashion</div>

    <div id="v-phone" class="view active">
        <div class="input-group">
            <span>+91</span>
            <input type="tel" id="login-phone" placeholder="Mobile Number" maxlength="10">
        </div>
        <div id="recaptcha-container"></div>
        <button class="btn-main" id="send-btn" disabled>Send Secure OTP</button>
        
        <div class="footer-link">
            New here? <a href="signup.html">Create an Account</a>
        </div>
    </div>

    <div id="v-otp" class="view">
        <h3 style="margin-bottom: 10px; font-weight: 800;">Verify Identity</h3>
        <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 30px;">Sent to +91 <span id="num-label" style="color: var(--text-main); font-weight: 800;"></span></p>
        
        <div class="otp-inputs">
            <input type="tel" class="otp-field" maxlength="1">
            <input type="tel" class="otp-field" maxlength="1">
            <input type="tel" class="otp-field" maxlength="1">
            <input type="tel" class="otp-field" maxlength="1">
            <input type="tel" class="otp-field" maxlength="1">
            <input type="tel" class="otp-field" maxlength="1">
        </div>

        <div class="resend-box">
            <span id="t-label">Resend in </span>
            <span id="timer" style="color: var(--accent);">00:30</span>
            <span id="resend-link" onclick="resendOTP()" class="resend-link" style="display: none;">Resend OTP</span>
        </div>

        <button class="btn-main" id="verify-btn">Authorize & Enter</button>
    </div>
</div>

<div id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q", 
        authDomain: "fashora-flipkart.firebaseapp.com", 
        projectId: "fashora-flipkart", 
        storageBucket: "fashora-flipkart.firebasestorage.app", 
        messagingSenderId: "383843603520", 
        appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let confirmResult = null;
    let timerInt;
    const showMsg = (m) => { 
        const x = document.getElementById('toast'); 
        x.innerText=m; x.style.display='block'; 
        setTimeout(()=>x.style.display='none', 3000); 
    };

    function startTimer() {
        let sec = 30;
        const tDisplay = document.getElementById('timer');
        const tLabel = document.getElementById('t-label');
        const rLink = document.getElementById('resend-link');
        rLink.style.display = 'none';
        tDisplay.style.display = 'inline';
        tLabel.style.display = 'inline';
        clearInterval(timerInt);
        timerInt = setInterval(() => {
            sec--;
            tDisplay.innerText = `00:${sec < 10 ? '0' + sec : sec}`;
            if (sec <= 0) {
                clearInterval(timerInt);
                rLink.style.display = 'inline';
                tDisplay.style.display = 'none';
                tLabel.style.display = 'none';
            }
        }, 1000);
    }

    const pInput = document.getElementById('login-phone');
    const sBtn = document.getElementById('send-btn');
    pInput.oninput = () => sBtn.disabled = pInput.value.length !== 10;

    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { 'size': 'invisible' });

    sBtn.onclick = async () => {
        try {
            confirmResult = await signInWithPhoneNumber(auth, "+91" + pInput.value, window.recaptchaVerifier);
            document.getElementById('num-label').innerText = pInput.value;
            document.getElementById('v-phone').classList.remove('active');
            document.getElementById('v-otp').classList.add('active');
            startTimer();
        } catch (e) { showMsg("Error sending OTP"); }
    };

    window.resendOTP = async () => {
        try {
            confirmResult = await signInWithPhoneNumber(auth, "+91" + pInput.value, window.recaptchaVerifier);
            showMsg("OTP Resent!");
            startTimer();
        } catch (e) { showMsg("Please wait."); }
    };

    const boxes = document.querySelectorAll('.otp-field');
    boxes.forEach((b, i) => {
        b.oninput = () => { if(b.value && i < 5) boxes[i+1].focus(); };
        b.onkeydown = (e) => { if(e.key === "Backspace" && !b.value && i > 0) boxes[i-1].focus(); };
    });

    document.getElementById('verify-btn').onclick = async () => {
        const code = Array.from(boxes).map(b => b.value).join('');
        if(code.length < 6) return showMsg("Enter 6-digit OTP");
        try {
            const res = await confirmResult.confirm(code);
            const snap = await getDoc(doc(db, "users", res.user.uid));
            if (snap.exists()) {
                showMsg("Authenticating...");
                setTimeout(() => { window.location.href = "index.html"; }, 1000);
            } else {
                showMsg("Account not found. Please Signup.");
                setTimeout(() => window.location.href = "signup.html", 2000);
            }
        } catch (e) { showMsg("Invalid OTP"); }
    };
</script>
</body>
</html>
