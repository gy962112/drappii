<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Track Order | Drapii</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --meesho-pink: #f43397; --bg: #f8f8f8; --green: #03a685; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); padding-bottom: 30px; }
        .header { background: #fff; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee; }
        
        .card { background: #fff; margin-top: 8px; padding: 16px; }
        .product-brief { display: flex; gap: 12px; align-items: center; border-bottom: 1px solid #f5f5f5; padding-bottom: 15px; }
        .product-brief img { width: 60px; height: 75px; object-fit: cover; border-radius: 4px; }
        
        /* Stepper Tracking UI */
        .tracking-container { margin-top: 20px; padding-left: 20px; }
        .step { position: relative; padding-bottom: 30px; border-left: 2px solid #ddd; padding-left: 30px; }
        .step.active { border-left-color: var(--green); }
        .step::before { content: ""; position: absolute; left: -9px; top: 0; width: 16px; height: 16px; background: #ddd; border-radius: 50%; }
        .step.active::before { background: var(--green); border: 3px solid #e8f5e9; }
        .step-title { font-size: 14px; font-weight: 700; color: #333; }
        .step-date { font-size: 11px; color: #666; }
        .step:last-child { border-left: none; }
    </style>
</head>
<body>
    <div class="header">
        <i class="fa fa-arrow-left" onclick="history.back()"></i>
        <span style="font-weight:700;">Track Order</span>
    </div>

    <div id="trackContent">
        <p style="text-align:center; padding:50px;">Fetching tracking details...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAktuzpc6myYe-szK-GbTQdn_Iu0bYQW8Q", 
            authDomain: "fashora-flipkart.firebaseapp.com", 
            projectId: "fashora-flipkart", 
            storageBucket: "fashora-flipkart.firebasestorage.app", 
            messagingSenderId: "383843603520", 
            appId: "1:383843603520:web:729cb5ac9437eb7b1cbba5" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');

        async function loadTracking() {
            if(!orderId) return;
            const docSnap = await getDoc(doc(db, "orders", orderId));
            if(docSnap.exists()) {
                const data = docSnap.data();
                const item = data.items[0]; // Pehla item dikhane ke liye
                
                document.getElementById('trackContent').innerHTML = `
                    <div class="card">
                        <div class="product-brief">
                            <img src="${item.image}">
                            <div>
                                <h4 style="font-size:14px;">${item.name}</h4>
                                <p style="font-size:12px; color:#666;">Size: ${item.size} | ₹${item.price}</p>
                            </div>
                        </div>
                        <div class="tracking-container">
                            <div class="step active">
                                <p class="step-title">Order Placed</p>
                                <p class="step-date">${data.orderDate}</p>
                            </div>
                            <div class="step ${data.status === 'Shipped' || data.status === 'Delivered' ? 'active' : ''}">
                                <p class="step-title">Shipped</p>
                                <p class="step-date">Pending</p>
                            </div>
                            <div class="step ${data.status === 'Delivered' ? 'active' : ''}">
                                <p class="step-title">Delivered</p>
                                <p class="step-date">Expected soon</p>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <h4 style="font-size:13px; margin-bottom:10px;">Delivery Address</h4>
                        <p style="font-size:12px; color:#444;">${data.customerName}</p>
                        <p style="font-size:12px; color:#666;">${data.fullAddress}</p>
                    </div>
                `;
            }
        }
        loadTracking();
    </script>
</body>
</html>
